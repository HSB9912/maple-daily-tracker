<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>보스 파티 편성판 · Boss Party Board</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e1016; --panel: #171a23; --panel-2: #1e222e;
    --line: #2a2f3d; --line-2: #363c4d;
    --text: #e7e9ee; --muted: #8b90a0; --muted-2: #6a6f7e;
    --accent: #6c8cff; --accent-soft: #6c8cff22;
    --good: #4ecb8d; --warn: #f0b45e; --danger: #f06e6e;
    --solo: #f0b45e; --duo: #6c8cff; --trio: #b06cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: 13px;
  }
  .en { font-size: 0.72em; color: var(--muted-2); font-weight: 400; }

  header { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 14px; font-weight: 700; }
  header .spacer { margin-left: auto; }
  .sync { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
  .sync .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-2); transition: 0.2s; }
  .sync.saved .dot { background: var(--good); } .sync.saved { color: var(--good); }
  .sync.saving .dot { background: var(--warn); } .sync.saving { color: var(--warn); }
  .sync.local .dot { background: var(--muted); } .sync.local { color: var(--muted); }
  .sync.error .dot { background: var(--danger); } .sync.error { color: var(--danger); }
  .btn.saved { background: var(--good); border-color: var(--good); color: #08130d; }

  .btn { border: 1px solid var(--line-2); background: var(--panel-2); color: var(--text); border-radius: 7px; padding: 6px 11px; font-size: 12.5px; cursor: pointer; transition: 0.12s; font-family: inherit; }
  .btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.ghost { background: transparent; }
  .btn.sm { padding: 4px 8px; font-size: 11.5px; border-radius: 6px; }

  .app { display: flex; flex: 1; min-height: 0; }

  /* ===== Left roster ===== */
  .pool { width: 200px; flex-shrink: 0; border-right: 1px solid var(--line); background: var(--panel); display: flex; flex-direction: column; }
  .pool-head { padding: 9px 11px 7px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 6px; }
  .pool-head h2 { font-size: 12.5px; }
  .pool-head .big { margin-left: auto; font-size: 12.5px; font-weight: 800; }
  .pool-list { flex: 1; overflow-y: auto; padding: 5px 7px; display: flex; flex-direction: column; gap: 1px; }
  .member { display: flex; align-items: center; gap: 7px; border: 1px solid transparent; border-radius: 6px; padding: 4px 7px; cursor: grab; transition: 0.1s; user-select: none; }
  .member:hover { background: var(--panel-2); border-color: var(--line); }
  .member.dragging { opacity: 0.4; }
  .member .nick { flex: 1; min-width: 0; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member .hexa { font-size: 10.5px; color: var(--muted-2); flex-shrink: 0; }
  .member .bpill { font-size: 9.5px; font-weight: 700; color: var(--accent); flex-shrink: 0; min-width: 24px; text-align: right; }
  .member .bpill.zero { color: var(--muted-2); }
  .member .del-m { color: var(--muted-2); cursor: pointer; font-size: 11px; flex-shrink: 0; opacity: 0; }
  .member:hover .del-m { opacity: 1; }
  .member .del-m:hover { color: var(--danger); }
  .member.drop-hi { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 1px var(--accent); }
  .pgroup { border: 1px solid var(--line-2); border-radius: 9px; padding: 3px; margin: 2px 0; background: #6c8cff0d; }
  .pgroup.drop-hi { border-color: var(--accent); background: var(--accent-soft); }
  .pgroup-h { font-size: 9.5px; color: var(--accent); font-weight: 800; padding: 3px 7px 4px; letter-spacing: 0.02em; }
  .pool-foot { border-top: 1px solid var(--line); padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  .add-form .row { display: flex; gap: 5px; margin-bottom: 5px; }
  input.fld { flex: 1; background: var(--bg); border: 1px solid var(--line-2); border-radius: 6px; padding: 6px 8px; color: var(--text); font-size: 12px; font-family: inherit; min-width: 0; }
  input.fld:focus { outline: none; border-color: var(--accent); }
  input.fld.hexa { max-width: 72px; }

  /* ===== Right board : compact horizontal boss rows ===== */
  .board { flex: 1; overflow-y: auto; padding: 2px 12px 16px; }
  .boss-sec { display: flex; align-items: flex-start; gap: 10px; padding: 7px 4px; border-bottom: 1px solid var(--line); }
  .boss-sec:last-child { border-bottom: none; }

  .bsec-info { width: 150px; flex-shrink: 0; }
  .bsec-info .r1 { display: flex; align-items: flex-start; gap: 6px; }
  .bsec-info .bname { flex: 1; min-width: 0; font-size: 13px; font-weight: 800; cursor: pointer; word-break: break-all; line-height: 1.25; }
  .bsec-info .bname:hover { color: var(--accent); }
  .bsec-info .diff { cursor: pointer; }
  .diff { font-size: 9.5px; font-weight: 800; padding: 1px 6px; border-radius: 5px; border: 1px solid var(--dc, var(--muted-2)); color: var(--dc, var(--muted-2)); line-height: 1.35; flex-shrink: 0; }
  .bsec-info .del-boss { color: var(--muted-2); background: none; border: none; cursor: pointer; font-size: 12px; opacity: 0; flex-shrink: 0; }
  .boss-sec:hover .del-boss { opacity: 1; }
  .bsec-info .del-boss:hover { color: var(--danger); }
  .bsec-info .r2 { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .bsec-info .prog { font-size: 10.5px; color: var(--muted); }
  .bsec-info .prog.done { color: var(--good); font-weight: 700; }
  .addp { display: flex; gap: 3px; margin-top: 5px; }
  .addp button { font-size: 10.5px; padding: 2px 6px; border-radius: 5px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line-2); color: var(--muted); font-family: inherit; display: flex; align-items: center; gap: 3px; }
  .addp button:hover { color: var(--text); border-color: var(--accent); }
  .addp .sw { width: 7px; height: 7px; border-radius: 2px; }

  .bsec-right { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; padding-top: 1px; }
  .bsec-parties { display: flex; flex-wrap: wrap; gap: 5px; align-items: flex-start; }
  .party { display: flex; align-items: center; gap: 4px; padding: 3px 6px 3px 5px; border: 1px solid var(--line); border-left: 3px solid var(--tone); border-radius: 7px; background: var(--panel); }
  .party .tag { font-size: 9px; font-weight: 800; color: var(--muted); flex-shrink: 0; letter-spacing: 0.02em; }
  .party .pdiff { font-size: 9.5px; font-weight: 800; color: var(--dc, var(--muted-2)); background: transparent; border: 1px solid var(--dc, var(--muted-2)); border-radius: 5px; padding: 1px 3px; font-family: inherit; cursor: pointer; flex-shrink: 0; -webkit-appearance: none; appearance: none; }
  .party .pdiff:focus { outline: none; }
  .party .pdiff option { background: var(--panel); color: var(--text); }
  .party .sum { font-size: 9px; color: var(--muted-2); flex-shrink: 0; }
  .party .del-p { color: var(--muted-2); background: none; border: none; cursor: pointer; font-size: 10px; flex-shrink: 0; padding: 0 1px; }
  .party .del-p:hover { color: var(--danger); }
  .party.over { border-color: var(--tone); box-shadow: 0 0 0 1px var(--tone); }

  .token { display: flex; align-items: center; gap: 4px; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 5px; padding: 2px 4px 2px 6px; cursor: grab; user-select: none; }
  .token .nick { font-size: 11px; font-weight: 600; white-space: nowrap; }
  .token .hx { font-size: 9px; color: var(--muted-2); }
  .token .rm { color: var(--muted-2); cursor: pointer; font-size: 10px; }
  .token .rm:hover { color: var(--danger); }
  .slot-mini { min-width: 24px; height: 21px; border: 1px dashed var(--line-2); border-radius: 5px; display: grid; place-items: center; color: var(--muted-2); font-size: 12px; }
  .slot-mini.over { border-color: var(--tone); background: var(--tone-soft); color: var(--tone); }

  .un-c { display: flex; }
  .un-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 700; color: var(--muted); background: var(--panel); border: 1px dashed var(--line-2); border-radius: 20px; padding: 3px 11px; cursor: pointer; }
  .un-pill:hover { border-color: var(--accent); color: var(--text); }
  .un-pill.done { color: var(--good); border-style: solid; border-color: #4ecb8d55; cursor: default; }
  .un-pill .cnt { background: var(--warn); color: #0e1016; border-radius: 20px; padding: 0 6px; font-size: 9.5px; font-weight: 800; }
  .un-pill.over, .un-open.over { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
  .un-open { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; padding: 5px 9px; border: 1px dashed var(--line-2); border-radius: 8px; background: #00000030; }
  .un-open .un-lbl { font-size: 10px; font-weight: 800; color: var(--muted-2); }
  .un-fold { font-size: 10px; color: var(--muted-2); background: none; border: none; cursor: pointer; margin-left: 2px; }
  .un-fold:hover { color: var(--text); }
  .utok { display: flex; align-items: center; gap: 4px; background: transparent; border: 1px dashed var(--line-2); border-radius: 5px; padding: 2px 6px; cursor: grab; user-select: none; }
  .utok .n { font-size: 11px; font-weight: 600; color: var(--muted); }
  .utok .h { font-size: 9px; color: var(--muted-2); }

  .board-empty { color: var(--muted-2); font-size: 12.5px; text-align: center; margin: 50px auto; line-height: 1.7; }

  .modal-bg { position: fixed; inset: 0; background: #0009; display: none; align-items: center; justify-content: center; z-index: 50; }
  .modal-bg.on { display: flex; }
  .modal { width: 320px; background: var(--panel); border: 1px solid var(--line-2); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .modal h3 { font-size: 14px; }
  .modal label { font-size: 11px; color: var(--muted-2); display: block; margin-bottom: 5px; }
  .diff-seg { display: flex; gap: 5px; flex-wrap: wrap; }
  .diff-seg button { flex: 1; min-width: 54px; padding: 7px 0; font-size: 12px; font-weight: 700; border-radius: 7px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line-2); color: var(--muted); font-family: inherit; }
  .diff-seg button.on { background: var(--dc)22; border-color: var(--dc); color: var(--dc); }
  .modal .actions { display: flex; gap: 7px; justify-content: flex-end; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2c3242; border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* 멤버 선택 모달 목록 */
  .pick-list { display: flex; flex-direction: column; gap: 5px; max-height: 52vh; overflow-y: auto; }
  .pick-item { display: flex; align-items: center; gap: 8px; padding: 10px 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--panel-2); cursor: pointer; }
  .pick-item:hover { border-color: var(--accent); background: var(--accent-soft); }
  .pick-item .n { flex: 1; font-size: 13.5px; font-weight: 600; }
  .pick-item .h { font-size: 11.5px; color: var(--muted-2); }
  .pick-empty { color: var(--muted-2); font-size: 12.5px; text-align: center; padding: 18px; }

  /* ===== 뷰 토글 ===== */
  .vseg { display: flex; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 9px; padding: 2px; }
  .vseg button { font-size: 12.5px; padding: 6px 13px; border: none; background: none; color: var(--muted); border-radius: 7px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .vseg button.on { background: var(--accent); color: #fff; }

  /* ===== 일정표 ===== */
  #view-sched { flex: 1; display: none; flex-direction: column; min-height: 0; }
  #view-sched.on { display: flex; }
  .wkbar { display: flex; align-items: center; gap: 8px; padding: 9px 16px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .wkbar .w { font-size: 12.5px; font-weight: 700; } .wkbar .t { font-size: 11px; color: var(--muted-2); }
  .wkbar .me-sel { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-left: auto; }
  .wkbar .me-sel select { background: var(--bg); border: 1px solid var(--line-2); border-radius: 7px; color: var(--text); padding: 5px 8px; font-family: inherit; font-size: 12.5px; }
  .sched-main { flex: 1; overflow: auto; padding: 14px 16px 60px; }

  .mem { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
  .mchip { font-size: 10px; background: #ffffff10; border: 1px solid var(--line-2); border-radius: 20px; padding: 1px 7px; color: var(--muted); }
  .mchip.me { background: #6c8cff22; border-color: #6c8cff88; color: #c7d3ff; font-weight: 700; }

  .cols { display: grid; grid-template-columns: repeat(7, minmax(150px,1fr)); gap: 10px; }
  .col { background: var(--panel); border: 1px solid var(--line); border-radius: 11px; overflow: hidden; display: flex; flex-direction: column; }
  .col-h { padding: 8px 11px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 6px; }
  .col-h.today { background: #141a2b; }
  .col-h .d { font-size: 13px; font-weight: 800; } .col-h.today .d { color: var(--accent); }
  .col-h .dt { font-size: 10px; color: var(--muted-2); } .col-h .n { margin-left: auto; font-size: 10px; color: var(--muted-2); }
  .col-b { padding: 9px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .rcard { border: 1px solid var(--line); border-left: 3px solid var(--dc); border-radius: 9px; padding: 8px 9px; background: var(--panel-2); position: relative; }
  .rcard.done { opacity: .5; } .rcard.mine { box-shadow: inset 2px 0 0 var(--accent); }
  .rcard .r1 { display: flex; align-items: center; gap: 6px; }
  .rcard .time { font-size: 12px; font-weight: 800; }
  .rcard .bn { font-size: 12.5px; font-weight: 700; }
  .rcard .sz { margin-left: auto; font-size: 9.5px; color: var(--muted-2); font-weight: 700; }
  .rcard .r2 { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
  .rcard .actions { position: absolute; top: 6px; right: 7px; display: flex; gap: 6px; opacity: 0; }
  .rcard:hover .actions { opacity: 1; }
  .rcard .ic { font-size: 12px; color: var(--muted-2); cursor: pointer; }
  .rcard .ic.del:hover { color: var(--danger); }
  .rcard .chk { width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid var(--line-2); display: grid; place-items: center; font-size: 11px; color: var(--good); cursor: pointer; }
  .rcard .chk.on { background: var(--good); border-color: var(--good); color: #08130d; }
  .rcard .dcnt { font-size: 9.5px; color: var(--muted-2); }
  .addc { border: 1px dashed var(--line-2); border-radius: 9px; color: var(--muted-2); font-size: 11.5px; text-align: center; padding: 8px; cursor: pointer; }
  .addc:hover { border-color: var(--accent); color: var(--accent); }

  .agenda { max-width: 560px; }
  .aday { margin-bottom: 14px; }
  .aday-h { display: flex; align-items: baseline; gap: 7px; margin-bottom: 7px; }
  .aday-h .d { font-size: 13px; font-weight: 800; } .aday-h.today .d { color: var(--accent); }
  .aday-h .dt { font-size: 11px; color: var(--muted-2); } .aday-h .line { flex: 1; height: 1px; background: var(--line); }
  .arow { display: flex; align-items: center; gap: 11px; background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--dc); border-radius: 10px; padding: 9px 12px; margin-bottom: 6px; }
  .arow.done { opacity: .5; }
  .arow .time { font-size: 13px; font-weight: 800; width: 52px; flex-shrink: 0; }
  .arow .mid { flex: 1; min-width: 0; } .arow .bn { font-size: 13px; font-weight: 700; }
  .arow .who { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .arow .chk { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--line-2); display: grid; place-items: center; font-size: 13px; color: var(--good); cursor: pointer; flex-shrink: 0; }
  .arow.done .chk { background: var(--good); border-color: var(--good); color: #08130d; }
  .sched-empty { color: var(--muted-2); font-size: 13px; text-align: center; margin-top: 40px; line-height: 1.7; }

  /* 공유 타임라인 (시간 축) */
  .tl { display: grid; grid-template-columns: 46px repeat(7, minmax(100px,1fr)); min-width: 760px; }
  .tl-corner { border-bottom: 1px solid var(--line-2); }
  .tl-dh { position: relative; text-align: center; font-weight: 800; font-size: 12px; padding: 6px 0 7px; border-bottom: 1px solid var(--line-2); display: flex; flex-direction: column; gap: 1px; }
  .tl-dh.today { color: var(--accent); }
  .tl-dh small { font-size: 9px; color: var(--muted-2); font-weight: 400; }
  .tl-dh .addb { position: absolute; top: 5px; right: 7px; font-size: 13px; color: var(--muted-2); cursor: pointer; }
  .tl-dh .addb:hover { color: var(--accent); }
  .tl-ruler { position: relative; }
  .tl-ruler .hl { position: absolute; right: 6px; font-size: 9.5px; color: var(--muted-2); transform: translateY(-6px); font-variant-numeric: tabular-nums; }
  .tl-lane { position: relative; border-left: 1px solid var(--line); }
  .tl-lane .gl { position: absolute; left: 0; right: 0; height: 1px; background: var(--line); opacity: .4; }
  .tl-ev { position: absolute; border: 1px solid var(--line); border-left: 3px solid var(--dc); background: var(--panel-2); border-radius: 6px; padding: 2px 5px; overflow: hidden; cursor: pointer; }
  .tl-ev.done { opacity: .42; }
  .tl-ev.mine { box-shadow: inset 2px 0 0 var(--accent); }
  .tl-ev .et { font-size: 9.5px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--muted); }
  .tl-ev .eb { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
  .tl-ev .done-dot { color: var(--good); }
  .tl-ev .ex { position: absolute; top: 1px; right: 3px; font-size: 10px; color: var(--muted-2); opacity: 0; }
  .tl-ev:hover .ex { opacity: 1; } .tl-ev .ex:hover { color: var(--danger); }

  /* 파티 선택 리스트 (일정 추가 모달) */
  .plist { display: flex; flex-direction: column; gap: 6px; max-height: 230px; overflow: auto; }
  .pitem { border: 1px solid var(--line); border-left: 3px solid var(--dc); border-radius: 9px; padding: 8px 10px; background: var(--panel-2); cursor: pointer; }
  .pitem.on { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .pitem .p1 { display: flex; align-items: center; gap: 6px; }
  .pitem .pb { font-size: 13px; font-weight: 700; } .pitem .ps { margin-left: auto; font-size: 10px; color: var(--muted-2); font-weight: 700; }
  .pitem .pdiffb { font-size: 9px; font-weight: 800; padding: 1px 6px; border-radius: 5px; border: 1px solid var(--dc); color: var(--dc); }
  .segwrap { display: flex; gap: 5px; flex-wrap: wrap; }
  .segwrap button { flex: 1; min-width: 40px; padding: 8px 0; font-size: 12.5px; font-weight: 700; border-radius: 7px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line-2); color: var(--muted); font-family: inherit; }
  .segwrap button.on { background: var(--accent-soft); border-color: var(--accent); color: #a9bcff; }
  .row2 { display: flex; gap: 8px; }

  /* ===== 모바일 최적화 ===== */
  @media (max-width: 760px) {
    body { font-size: 14px; }
    header { flex-wrap: wrap; gap: 7px; padding: 8px 10px; }
    header h1 { font-size: 15px; }
    .sync { order: 5; font-size: 11px; }
    #btn-save, #btn-reload, #btn-add-boss { padding: 7px 12px; font-size: 13px; }

    .app { flex-direction: column; }
    .pool { width: 100%; flex-shrink: 0; border-right: none; border-bottom: 1px solid var(--line); max-height: 34vh; }
    .board { padding: 6px 10px 60px; }

    .boss-sec { flex-direction: column; align-items: stretch; gap: 8px; padding: 10px 2px; }
    .bsec-info { width: auto; display: flex; align-items: center; flex-wrap: wrap; gap: 8px 10px; }
    .bsec-info .r1 { flex: 1; min-width: 120px; }
    .bsec-info .bname { font-size: 15px; }
    .bsec-info .r2 { margin-top: 0; }
    .bsec-info .addp { margin: 0 0 0 auto; }
    .bsec-info .del-boss { opacity: 1; font-size: 15px; }

<script>
/* ===== Supabase (기존 프로젝트 재사용 · 새 테이블로 격리) ===== */
const SUPABASE_URL = 'https://lapxytabpabdkomjspta.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhcHh5dGFicGFiZGtvbWpzcHRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODM5OTcsImV4cCI6MjA5MTY1OTk5N30.tU4zbHkbM-fan_MIeV0bqjMu8Z_LKkj335YrdnKMVR8';
const TABLE = 'boss_party_state';
const ROW_ID = 'main';
const LS_KEY = 'bossparty_state';
let _supabase = null;
try { _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { console.warn('supabase init 실패', e); }
// 안전장치: 로컬(localhost/파일)에서는 클라우드 저장·불러오기 금지 → 테스트가 실서비스 데이터 못 건드림
const CLOUD_ENABLED = /(^|\.)github\.io$/.test(location.hostname);

const SIZE_META = { 1:{label:"솔격",tone:"var(--solo)",soft:"#f0b45e22"}, 2:{label:"2인",tone:"var(--duo)",soft:"#6c8cff22"}, 3:{label:"3인",tone:"var(--trio)",soft:"#b06cff22"} };
const DIFFS = ["이지","노말","하드","카오스","익스트림"];
const DIFF_COLOR = { "이지":"#4ecb8d","노말":"#8b90a0","하드":"#f0b45e","카오스":"#b06cff","익스트림":"#f06e6e" };

let members = [];
let bosses = [];
let schedule = [];   // 일정: {id, boss:bossId, party:partyId, dow:0~6(월~일), time:"HH:MM", doneBy:[memberId]}
let mid=1, bid=1, pid=1, rid=1, loaded=false, saveTimer=null;
let lastPartyDiff = "하드";   // 새 파티 추가 시 기본 난이도 (마지막 선택값 기억)
let view = "board";  // "board" | "sched"
let meId = localStorage.getItem("bossparty_me") || null;
let schedView = "week";  // "week" | "me"
let weekOffset = 0;
const DOW = ["월","화","수","목","금","토","일"];

const fmt = n => (n||0).toLocaleString("ko-KR");
const byId = id => members.find(m => m.id === id);
const escapeHtml = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

function assignedIds(boss){ const s=new Set(); boss.parties.forEach(p=>p.seats.forEach(x=>{if(x)s.add(x);})); return s; }
function unassignedFor(boss){ const a=assignedIds(boss); return members.filter(m=>!a.has(m.id)).sort((x,y)=>y.hexa-x.hexa); }
function pullFromBoss(boss, mId){ boss.parties.forEach(p=>p.seats=p.seats.map(x=>x===mId?null:x)); }
function bossesOf(mId){ return bosses.filter(b=>assignedIds(b).has(mId)).length; }

/* ===== Persistence ===== */
function serialize(){ return { members, bosses, schedule, v:2 }; }
function applyState(s){
  if(!s) return false;
  members = Array.isArray(s.members) ? s.members : [];
  bosses  = Array.isArray(s.bosses) ? s.bosses.map(b=>({ ...b, parties:(b.parties||[]).map(p=>({ ...p, seats:Array.isArray(p.seats)?p.seats:[], diff: p.diff || b.diff || "노말" })) })) : [];
  schedule = Array.isArray(s.schedule) ? s.schedule.map(r=>({ ...r, doneBy: Array.isArray(r.doneBy)?r.doneBy:[] })) : [];
  return true;
}
function reseedCounters(){
  const num = id => parseInt(String(id).replace(/\D/g,''),10) || 0;
  mid = Math.max(1, ...members.map(m=>num(m.id)+1));
  bid = Math.max(1, ...bosses.map(b=>num(b.id)+1));
  let pmax = 1; bosses.forEach(b=>b.parties.forEach(p=>{ pmax=Math.max(pmax, num(p.id)+1); })); pid = pmax;
  rid = Math.max(1, ...schedule.map(r=>num(r.id)+1));
}
function setStatus(state){
  const el = document.getElementById("sync");
  const txt = { saving:"저장 중…", saved:"클라우드 저장됨", local:"로컬 저장됨", error:"저장 실패", loading:"불러오는 중…" }[state] || "";
  el.className = "sync " + (state==="loading" ? "" : state);
  document.getElementById("sync-txt").textContent = txt;
}
function scheduleSave(){
  if(!loaded) return;
  try { localStorage.setItem(LS_KEY, JSON.stringify(serialize())); } catch(e){}
  setStatus("saving"); clearTimeout(saveTimer); saveTimer = setTimeout(cloudSave, 700);
}
// 클라우드 저장 성공 여부를 반환 (실패해도 로컬은 이미 저장됨)
async function cloudSave(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(serialize())); } catch(e){}
  if(!_supabase || !CLOUD_ENABLED){ setStatus("local"); return false; }
  try {
    const { error } = await _supabase.from(TABLE).upsert({ id: ROW_ID, data: serialize() }, { onConflict:'id' });
    if(error){ setStatus("local"); console.warn(error); return false; }
    setStatus("saved"); return true;
  } catch(e){ setStatus("local"); console.warn(e); return false; }
}
async function cloudLoad(){
  if(!_supabase || !CLOUD_ENABLED) return false;
  try { const { data, error } = await _supabase.from(TABLE).select('data').eq('id', ROW_ID).single(); if(!error && data && data.data) return applyState(data.data); }
  catch(e){ console.warn(e); }
  return false;
}

/* ===== Left roster ===== */
function memberRow(m){
  const cnt = bossesOf(m.id);
  const el = document.createElement("div");
  el.className="member"; el.draggable=true; el.dataset.mid=m.id;
  el.innerHTML = `<span class="nick" title="클릭하여 수정 · 다른 멤버로 끌어 합치기">${escapeHtml(m.nick)}</span><span class="hexa">${fmt(m.hexa)}</span><span class="bpill ${cnt?"":"zero"}" title="배정된 보스 수">${cnt}/${bosses.length}</span><span class="del-m" title="삭제">✕</span>`;
  el.addEventListener("dragstart", e=>{ e.stopPropagation(); e.dataTransfer.setData("mid", m.id); e.dataTransfer.setData("merge","1"); el.classList.add("dragging"); });
  el.addEventListener("dragend", ()=>el.classList.remove("dragging"));
  el.querySelector(".nick").addEventListener("click", ()=>openMemberEdit(m));
  el.querySelector(".del-m").addEventListener("click", ()=>{
    if(!confirm(`'${m.nick}' 멤버를 삭제할까요? 모든 보스에서 빠집니다.`)) return;
    members = members.filter(x=>x.id!==m.id); bosses.forEach(b=>pullFromBoss(b,m.id)); members.forEach(x=>{ if(x.owner===m.id) delete x.owner; }); renderAll();
  });
  // 다른 멤버 위에 떨구면 → 같은 사람으로 합치기
  el.addEventListener("dragover", e=>{ if(e.dataTransfer.types.includes("merge")){ e.preventDefault(); e.stopPropagation(); el.classList.add("drop-hi"); } });
  el.addEventListener("dragleave", ()=>el.classList.remove("drop-hi"));
  el.addEventListener("drop", e=>{
    if(!e.dataTransfer.types.includes("merge")) return;
    e.preventDefault(); e.stopPropagation(); el.classList.remove("drop-hi");
    const src=e.dataTransfer.getData("mid"); if(src && src!==m.id) mergePerson(src, pkeyOf(m));
  });
  return el;
}
function renderPool(){
  const list = document.getElementById("pool-list");
  document.getElementById("roster-count").textContent = members.length;
  list.innerHTML = "";
  if(!members.length){ list.innerHTML='<div style="color:var(--muted-2);font-size:11.5px;padding:8px 4px">아래에서 멤버를 추가하세요.</div>'; return; }
  const groups=new Map();
  members.forEach(m=>{ const pk=pkeyOf(m); if(!groups.has(pk)) groups.set(pk,[]); groups.get(pk).push(m); });
  const persons=[...groups.entries()].map(([pk,ms])=>({pk,ms,hexa:Math.max(0,...ms.map(x=>x.hexa||0))})).sort((a,b)=>b.hexa-a.hexa);
  persons.forEach(({pk,ms})=>{
    ms.sort((a,b)=>b.hexa-a.hexa);
    if(ms.length>1){
      const box=document.createElement("div"); box.className="pgroup";
      box.innerHTML=`<div class="pgroup-h">🔗 한 사람 · ${ms.length}캐릭</div>`;
      ms.forEach(m=>box.appendChild(memberRow(m)));
      box.addEventListener("dragover", e=>{ if(e.dataTransfer.types.includes("merge")){ e.preventDefault(); box.classList.add("drop-hi"); } });
      box.addEventListener("dragleave", ()=>box.classList.remove("drop-hi"));
      box.addEventListener("drop", e=>{ if(!e.dataTransfer.types.includes("merge"))return; e.preventDefault(); box.classList.remove("drop-hi"); const src=e.dataTransfer.getData("mid"); if(src) mergePerson(src, pk); });
      list.appendChild(box);
    } else {
      list.appendChild(memberRow(ms[0]));
    }
  });
}
/* 같은 사람으로 합치기 / 그룹 해제 */
function mergePerson(srcId, targetPk){
  const src=byId(srcId); if(!src||!targetPk) return;
  const srcPk=pkeyOf(src); if(srcPk===targetPk) return;   // 이미 같은 사람
  members.forEach(m=>{ if(pkeyOf(m)===srcPk){ if(m.id===targetPk) delete m.owner; else m.owner=targetPk; } });
  renderAll();
}
function detachMember(mid){
  const m=byId(mid); if(!m) return;
  const pk=pkeyOf(m); const grp=members.filter(x=>pkeyOf(x)===pk);
  if(grp.length<=1) return;                 // 그룹 아님
  if(m.owner){ delete m.owner; }            // 자식이면 그냥 빠짐
  else { const rest=grp.filter(x=>x.id!==m.id); const nr=rest[0]; delete nr.owner; rest.slice(1).forEach(x=>x.owner=nr.id); }  // 대표면 다른 캐릭을 대표로
  renderAll();
}
// 빈 로스터 영역에 떨구면 → 그룹 해제
(function(){
  const pl=document.getElementById("pool-list");
  pl.addEventListener("dragover", e=>{ if(e.dataTransfer.types.includes("merge")) e.preventDefault(); });
  pl.addEventListener("drop", e=>{ if(!e.dataTransfer.types.includes("merge")) return; e.preventDefault(); const src=e.dataTransfer.getData("mid"); if(src) detachMember(src); });
})();

/* ===== Right board ===== */
function renderBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  if(!bosses.length){ board.innerHTML='<div class="board-empty">아직 보스가 없어요.<br>오른쪽 위 <b>+ 보스</b>로 시작하세요.</div>'; return; }
  bosses.forEach(b=>board.appendChild(bossSection(b)));
}

function bossSection(boss){
  const total = members.length, done = assignedIds(boss).size, complete = total>0 && done===total;
  const sec = document.createElement("div"); sec.className="boss-sec";

  const info = document.createElement("div"); info.className="bsec-info";
  info.innerHTML = `
    <div class="r1">
      <span class="bname" title="클릭하여 이름 수정">${escapeHtml(boss.name)}</span>
      <button class="del-boss" title="보스 삭제">✕</button>
    </div>
    <div class="r2">
      <span class="prog ${complete?"done":""}">${done}/${total} 배정</span>
    </div>
    <div class="addp">
      <button data-add="1"><span class="sw" style="background:var(--solo)"></span>솔격</button>
      <button data-add="2"><span class="sw" style="background:var(--duo)"></span>2인</button>
      <button data-add="3"><span class="sw" style="background:var(--trio)"></span>3인</button>
    </div>`;
  info.querySelector(".del-boss").addEventListener("click", ()=>{
    if(!confirm(`'${boss.name}' 보스를 삭제할까요?`)) return;
    bosses = bosses.filter(x=>x.id!==boss.id); renderAll();
  });
  info.querySelector(".bname").addEventListener("click", ()=>openEditBoss(boss));
  info.querySelectorAll("[data-add]").forEach(btn=>btn.addEventListener("click", ()=>{
    const size=+btn.dataset.add; boss.parties.push({ id:"p"+(pid++), size, diff:lastPartyDiff, seats:Array(size).fill(null) }); renderAll();
  }));
  sec.appendChild(info);

  const right = document.createElement("div"); right.className="bsec-right";
  const parts = document.createElement("div"); parts.className="bsec-parties";
  boss.parties.forEach(p=>parts.appendChild(partyEl(boss,p)));
  right.appendChild(parts);
  right.appendChild(unassignedInline(boss));   // 파티 아래 별도 줄
  sec.appendChild(right);
  return sec;
}

function partyEl(boss,p){
  const meta = SIZE_META[p.size];
  const dc = DIFF_COLOR[p.diff] || "var(--muted-2)";
  const filled = p.seats.filter(Boolean);
  const total = filled.reduce((s,id)=>s+(byId(id)?.hexa||0),0);
  const el = document.createElement("div");
  el.className="party"; el.style.setProperty("--tone",dc); el.style.setProperty("--tone-soft",dc+"22");
  // 파티별 난이도 선택
  const sel = document.createElement("select"); sel.className="pdiff"; sel.title="이 파티가 가는 난이도"; sel.style.setProperty("--dc",dc);
  DIFFS.forEach(d=>{ const o=document.createElement("option"); o.value=d; o.textContent=d; if(d===p.diff)o.selected=true; sel.appendChild(o); });
  sel.addEventListener("change", ()=>{ p.diff=sel.value; lastPartyDiff=sel.value; renderAll(); });
  el.appendChild(sel);
  const tag = document.createElement("span"); tag.className="tag"; tag.textContent=meta.label; el.appendChild(tag);
  p.seats.forEach((mId,i)=>el.appendChild(seatEl(boss,p,i,mId)));
  const sum = document.createElement("span"); sum.className="sum"; sum.textContent = total?fmt(total):""; el.appendChild(sum);
  const del = document.createElement("button"); del.className="del-p"; del.title="파티 삭제"; del.textContent="✕";

  el.addEventListener("dragover", e=>{ e.preventDefault(); el.classList.add("over"); });

}

function attachUnassignDrop(el, boss){

  el.addEventListener("drop", e=>{

function unassignedInline(boss){
  const un = unassignedFor(boss);
  const wrap = document.createElement("div"); wrap.className="un-c";

  if(!un.length){

/* ============================================================
   일정표 (편성판 파티 연동)
   ============================================================ */
const findRunParty = run => { const b=bosses.find(x=>x.id===run.boss); const p=b&&b.parties.find(x=>x.id===run.party); return p?{b,p}:null; };
const partyMemberIds = p => p.seats.filter(Boolean);
const nickOf = id => byId(id)?.nick || "?";
/* ===== 인물(사람) 그룹 — 한 사람이 캐릭 여러 개 (m.owner=대표 캐릭 id) ===== */
const pkeyOf = m => m && (m.owner || m.id);           // 사람 key
const personIds = pk => members.filter(m=>pkeyOf(m)===pk).map(m=>m.id);  // 그 사람의 모든 캐릭 id
const personLabel = pk => { const ns=members.filter(m=>pkeyOf(m)===pk).map(m=>m.nick); return ns.join(" · ") || "?"; };
function listPersons(){
  const map=new Map();
  members.forEach(m=>{ const pk=pkeyOf(m); if(!map.has(pk)) map.set(pk,[]); map.get(pk).push(m); });
  return [...map.entries()].map(([pk,ms])=>({ pk, label: ms.map(x=>x.nick).join(" · "), hexa: Math.max(0,...ms.map(x=>x.hexa||0)) })).sort((a,b)=>b.hexa-a.hexa);
}
const myCharIn = p => partyMemberIds(p).find(id=>personIds(meId).includes(id));  // 이 파티에 있는 내 캐릭
// KST(한국/메이플 서버) 기준. getUTC* 로 읽으면 KST 벽시계.
function kstNow(){ return new Date(Date.now() + 9*3600000); }
const dowMon = d => (d.getUTCDay()+6)%7;   // 월=0 … 일=6
// 이번 리셋 주(목요일 시작) 7일 날짜 — 목,금,토,일,월,화,수
// off 주의 목요일(리셋 시작일) UTC-midnight
function thursdayOf(off){
  const k=kstNow();
  const sinceThu=(k.getUTCDay()-4+7)%7;
  const base=new Date(Date.UTC(k.getUTCFullYear(),k.getUTCMonth(),k.getUTCDate()));
  base.setUTCDate(base.getUTCDate()-sinceThu+off*7);
  return base;
}
const keyOf = d => `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
const curWeekKey = () => keyOf(thursdayOf(weekOffset));   // 지금 보고 있는 주의 소속 key
function weekDates(){
  const base=thursdayOf(weekOffset);
  return Array.from({length:7},(_,i)=>{const d=new Date(base);d.setUTCDate(base.getUTCDate()+i);return d;});
}
function isToday(d){ const k=kstNow(); return d.getUTCFullYear()===k.getUTCFullYear()&&d.getUTCMonth()===k.getUTCMonth()&&d.getUTCDate()===k.getUTCDate(); }
const RESET_DOW = [3,4,5,6,0,1,2];   // 목 금 토 일 월 화 수
const memChipsHtml = ids => { const mine=meId?personIds(meId):[]; return `<div class="mem">${ids.map(id=>`<span class="mchip ${mine.includes(id)?"me":""}">${escapeHtml(nickOf(id))}</span>`).join("")}</div>`; };

function setView(v){

function renderMeSel(){
  const sel = document.getElementById("me-sel"); if(!sel) return;
  const prev = meId;
  const ppl = listPersons();

}
function renderSchedule(){
  renderMeSel();
  const wd = weekDates();
  document.getElementById("wk-label").textContent = (weekOffset===0?"이번 주":weekOffset<0?`${-weekOffset}주 전`:`${weekOffset}주 후`)+" · 목요일 리셋";
  document.getElementById("wk-range").textContent = `${wd[0].getUTCMonth()+1}/${wd[0].getUTCDate()}(목) ~ ${wd[6].getUTCMonth()+1}/${wd[6].getUTCDate()}(수)`;
  document.getElementById("sv-week").classList.toggle("on", schedView==="week");
  document.getElementById("sv-me").classList.toggle("on", schedView==="me");
  const main = document.getElementById("sched-main"); main.innerHTML="";
  schedView==="week" ? schedWeek(main,wd) : schedMe(main,wd);
}
const effHour = t => { const [h,m]=t.split(":").map(Number); return (h<6?h+24:h)+m/60; };  // 새벽은 밤 뒤로
const hourLabel = h => (h>24?`${h-24}시`:h===24?"24시":`${h}시`);
function schedWeek(main,wd){
  const wk=curWeekKey();
  const weekRuns=schedule.filter(r=>r.week===wk && findRunParty(r));
  const effs=weekRuns.map(r=>effHour(r.time));
  let startH=effs.length?Math.floor(Math.min(...effs)):19;
  let endH  =effs.length?Math.ceil(Math.max(...effs))+1:24;
  if(endH-startH<4) endH=startH+4;
  const PXH=54, CARDH=44, H=(endH-startH)*PXH;

  const tl=document.createElement("div"); tl.className="tl";
  tl.appendChild(Object.assign(document.createElement("div"),{className:"tl-corner"}));
  wd.forEach(date=>{
    const dm=dowMon(date), today=isToday(date);
    const dh=document.createElement("div"); dh.className="tl-dh"+(today?" today":"");
    dh.innerHTML=`<span>${DOW[dm]}</span><small>${date.getUTCMonth()+1}/${date.getUTCDate()}</small><span class="addb" title="이 날 일정 추가">＋</span>`;
    dh.querySelector(".addb").onclick=()=>openAddRun(dm);
    tl.appendChild(dh);
  });
  const ruler=document.createElement("div"); ruler.className="tl-ruler"; ruler.style.height=H+"px";
  for(let h=startH;h<=endH;h++){ const l=document.createElement("div"); l.className="hl"; l.style.top=((h-startH)*PXH)+"px"; l.textContent=hourLabel(h); ruler.appendChild(l); }
  tl.appendChild(ruler);

  wd.forEach(date=>{
    const dm=dowMon(date);
    const lane=document.createElement("div"); lane.className="tl-lane"; lane.style.height=H+"px";
    for(let h=startH;h<=endH;h++){ const g=document.createElement("div"); g.className="gl"; g.style.top=((h-startH)*PXH)+"px"; lane.appendChild(g); }
    lane.addEventListener("click", e=>{
      if(e.target!==lane) return;
      let mins=Math.round((startH + e.offsetY/PXH)*2)*30;  // 30분 단위
      const t=String(Math.floor(mins/60)%24).padStart(2,'0')+":"+String(mins%60).padStart(2,'0');
      openAddRun(dm,t);
    });
    // 겹침 배치(칼럼)
    const items=schedule.filter(r=>r.week===wk && r.dow===dm && findRunParty(r))
      .map(r=>({r,top:(effHour(r.time)-startH)*PXH})).sort((a,b)=>a.top-b.top);
    let cluster=[], maxBottom=-1, colEnds=[];
    const flush=()=>{ if(cluster.length){ const cols=Math.max(...cluster.map(x=>x.col+1)); cluster.forEach(x=>x.cols=cols); } cluster=[]; };
    items.forEach(it=>{
      it.bottom=it.top+CARDH;
      if(it.top>=maxBottom){ flush(); colEnds=[]; maxBottom=it.bottom; } else maxBottom=Math.max(maxBottom,it.bottom);
      let c=colEnds.findIndex(end=>end<=it.top); if(c<0) c=colEnds.length; colEnds[c]=it.bottom; it.col=c; cluster.push(it);
    });
    flush();
    items.forEach(it=>{
      const {r,top,col,cols}=it, {b:boss,p}=findRunParty(r), dc=DIFF_COLOR[p.diff]||"#8b90a0";
      const myChar=meId?myCharIn(p):null, iDone=myChar&&r.doneBy.includes(myChar);
      const w=100/cols;
      const ev=document.createElement("div"); ev.className="tl-ev"+(iDone?" done":"")+(myChar?" mine":"");
      ev.style.cssText=`top:${top}px;height:${CARDH-3}px;left:calc(${col*w}% + 2px);width:calc(${w}% - 4px)`;
      ev.style.setProperty("--dc",dc);
      ev.title=`${r.time} ${boss.name} ${p.diff} ${SIZE_META[p.size].label}\n${partyMemberIds(p).map(nickOf).join(", ")||"(빈 파티)"}`;
      ev.innerHTML=`<div class="et">${r.time}${iDone?' <span class="done-dot">✓</span>':''}</div><div class="eb">${escapeHtml(boss.name)}</div><span class="ex" title="삭제">✕</span>`;
      ev.querySelector(".ex").onclick=e=>{ e.stopPropagation(); schedule=schedule.filter(x=>x.id!==r.id); afterSchedChange(); };
      ev.onclick=()=>{ if(myChar) toggleMyDone(r); };
      lane.appendChild(ev);
    });
    tl.appendChild(lane);
  });
  main.appendChild(tl);
  if(!weekRuns.length){ const hint=document.createElement("div"); hint.className="sched-empty"; hint.style.marginTop="14px"; hint.innerHTML="이번 주 일정이 없어요. 요일 칸을 <b>클릭</b>하거나 요일 위 <b>＋</b>로 추가하세요."; main.appendChild(hint); }
}
function schedCard(r){
  const fp=findRunParty(r); const {b:boss,p}=fp;
  const ids=partyMemberIds(p);
  const dc=DIFF_COLOR[p.diff]||"#8b90a0";
  const doneCnt=ids.filter(id=>r.doneBy.includes(id)).length;
  const allDone=ids.length>0 && doneCnt===ids.length;
  const myChar=meId?myCharIn(p):null;
  const iMine=!!myChar;
  const iDone=myChar && r.doneBy.includes(myChar);
  const el=document.createElement("div"); el.className="rcard"+(allDone?" done":"")+(iMine?" mine":""); el.style.setProperty("--dc",dc);
  el.innerHTML=`
    <div class="actions"><span class="ic del" title="일정 삭제">✕</span></div>
    <div class="r1"><span class="time">${r.time}</span><span class="bn">${escapeHtml(boss.name)}</span><span class="sz">${SIZE_META[p.size].label}</span></div>
    <div class="r2"><span class="diff" style="--dc:${dc}">${escapeHtml(p.diff)}</span>
      <span class="dcnt">완료 ${doneCnt}/${ids.length}</span>
      ${iMine?`<span class="chk ${iDone?"on":""}" title="내 완료 체크">${iDone?"✓":""}</span>`:""}</div>
    ${memChipsHtml(ids)}`;
  el.querySelector(".del").onclick=()=>{ schedule=schedule.filter(x=>x.id!==r.id); afterSchedChange(); };
  const chk=el.querySelector(".chk"); if(chk) chk.onclick=()=>toggleMyDone(r);
  return el;
}
function schedMe(main,wd){
  if(!meId){ main.innerHTML=`<div class="sched-empty">위 오른쪽에서 <b>‘나’</b>를 먼저 선택하세요.<br>내가 속한 파티 일정만 모아 보여줍니다.</div>`; return; }
  const wk=curWeekKey();
  const ag=document.createElement("div"); ag.className="agenda"; let any=false;
  wd.forEach(date=>{
    const dm=dowMon(date);
    const day=schedule.filter(r=>{ const fp=findRunParty(r); return r.week===wk && r.dow===dm && fp && myCharIn(fp.p); }).sort((a,b)=>a.time.localeCompare(b.time));
    if(!day.length) return; any=true;
    const today=isToday(date);
    const box=document.createElement("div"); box.className="aday";
    box.innerHTML=`<div class="aday-h ${today?"today":""}"><span class="d">${DOW[dm]}요일</span><span class="dt">${date.getUTCMonth()+1}/${date.getUTCDate()}</span><span class="line"></span></div>`;
    day.forEach(r=>{
      const {b:boss,p}=findRunParty(r); const dc=DIFF_COLOR[p.diff]||"#8b90a0";
      const myChar=myCharIn(p);
      const others=partyMemberIds(p).filter(id=>id!==myChar).map(nickOf);
      const iDone=myChar && r.doneBy.includes(myChar);
      const row=document.createElement("div"); row.className="arow"+(iDone?" done":""); row.style.setProperty("--dc",dc);
      row.innerHTML=`<span class="time">${r.time}</span>
        <div class="mid"><div class="bn">${escapeHtml(boss.name)} <span class="diff" style="--dc:${dc}">${escapeHtml(p.diff)}</span></div>
        <div class="who">${SIZE_META[p.size].label}${others.length?" · 같이: "+others.map(escapeHtml).join(", "):" · 솔로"}</div></div>
        <span class="chk">${iDone?"✓":""}</span>`;
      row.querySelector(".chk").onclick=()=>toggleMyDone(r);
      box.appendChild(row);
    });
    ag.appendChild(box);
  });
  if(!any) ag.innerHTML=`<div class="sched-empty"><b>${escapeHtml(personLabel(meId))}</b> 님이 속한 파티 일정이 이번 주에 없어요.<br>편성판에서 그 파티에 들어가 있으면 자동으로 떠요.</div>`;
  main.appendChild(ag);
}
function toggleMyDone(r){
  if(!meId){ alert("먼저 오른쪽에서 '나'를 선택하세요."); return; }
  const fp=findRunParty(r); if(!fp) return;
  const myChar=myCharIn(fp.p); if(!myChar) return;   // 이 파티에 내 캐릭이 없으면 무시
  r.doneBy = r.doneBy.includes(myChar) ? r.doneBy.filter(x=>x!==myChar) : [...r.doneBy, myChar];
  afterSchedChange();
}
function afterSchedChange(){ renderSchedule(); scheduleSave(); }

/* ===== 일정 추가 모달 ===== */
let runDay=3, runPickBoss=null, runPickParty=null;
function buildRunDay(){
  const el=document.getElementById("run-day"); el.innerHTML="";
  RESET_DOW.forEach(i=>{ const b=document.createElement("button"); b.textContent=DOW[i]; if(i===runDay)b.classList.add("on"); b.onclick=()=>{runDay=i;buildRunDay();}; el.appendChild(b); });
}
function buildRunPlist(){
  const el=document.getElementById("run-plist"); el.innerHTML="";
  const list=bosses.flatMap(b=>b.parties.map(p=>({b,p})));
  if(!list.length){ el.innerHTML=`<div class="sched-empty" style="margin:10px 0">편성판에 파티가 없어요. 먼저 편성판에서 파티를 만드세요.</div>`; return; }
  list.forEach(({b,p})=>{
    const dc=DIFF_COLOR[p.diff]||"#8b90a0"; const ids=partyMemberIds(p);
    const on = runPickBoss===b.id && runPickParty===p.id;
    const it=document.createElement("div"); it.className="pitem"+(on?" on":""); it.style.setProperty("--dc",dc);
    it.innerHTML=`<div class="p1"><span class="pb">${escapeHtml(b.name)}</span><span class="pdiffb" style="--dc:${dc}">${escapeHtml(p.diff)}</span><span class="ps">${SIZE_META[p.size].label}</span></div>${memChipsHtml(ids)}`;
    it.onclick=()=>{ runPickBoss=b.id; runPickParty=p.id; buildRunPlist();
      document.getElementById("run-sel").textContent=`${b.name} ${p.diff} · ${SIZE_META[p.size].label}`;
      document.getElementById("run-sel").style.color="var(--text)"; };
    el.appendChild(it);
  });
}
function openAddRun(dow, time){
  runDay = (dow!=null?dow:dowMon(kstNow())); if(runDay<0) runDay=3;
  runPickBoss=null; runPickParty=null;
  document.getElementById("run-time").value=time||"21:00";
  document.getElementById("run-sel").textContent="아직 선택 안 함"; document.getElementById("run-sel").style.color="var(--muted-2)";
  buildRunDay(); buildRunPlist();
  document.getElementById("run-bg").classList.add("on");
}
document.getElementById("btn-add-run").addEventListener("click", ()=>openAddRun());
document.getElementById("run-cancel").addEventListener("click", ()=>document.getElementById("run-bg").classList.remove("on"));
document.getElementById("run-bg").addEventListener("click", e=>{ if(e.target.id==="run-bg") e.currentTarget.classList.remove("on"); });
document.getElementById("run-ok").addEventListener("click", ()=>{
  if(!runPickBoss||!runPickParty){ alert("파티를 선택하세요."); return; }
  const time=document.getElementById("run-time").value||"21:00";
  schedule.push({ id:"r"+(rid++), boss:runPickBoss, party:runPickParty, dow:runDay, time, week:curWeekKey(), doneBy:[] });
  document.getElementById("run-bg").classList.remove("on");
  afterSchedChange();
});

/* 뷰 토글 / 주 이동 / 나 선택 */
document.getElementById("v-board").addEventListener("click", ()=>setView("board"));
document.getElementById("v-sched").addEventListener("click", ()=>setView("sched"));
document.getElementById("sv-week").addEventListener("click", ()=>{ schedView="week"; renderSchedule(); });
document.getElementById("sv-me").addEventListener("click", ()=>{ schedView="me"; renderSchedule(); });
document.getElementById("wk-prev").addEventListener("click", ()=>{ weekOffset--; renderSchedule(); });
document.getElementById("wk-next").addEventListener("click", ()=>{ weekOffset++; renderSchedule(); });
document.getElementById("wk-copy").addEventListener("click", ()=>{
  const wk=curWeekKey(), prevKey=keyOf(thursdayOf(weekOffset-1));
  const prev=schedule.filter(r=>r.week===prevKey);
  if(!prev.length){ alert("지난 주에 복사할 일정이 없어요."); return; }
  let added=0;
  prev.forEach(r=>{
    const dup=schedule.some(x=>x.week===wk && x.boss===r.boss && x.party===r.party && x.dow===r.dow && x.time===r.time);
    if(!dup){ schedule.push({ id:"r"+(rid++), boss:r.boss, party:r.party, dow:r.dow, time:r.time, week:wk, doneBy:[] }); added++; }
  });
  afterSchedChange();
  alert(added?`지난 주 일정 ${added}개를 이 주로 복사했어요.`:"이미 다 복사돼 있어요.");
});
document.getElementById("me-sel").addEventListener("change", e=>{
  meId = e.target.value || null;
  if(meId) localStorage.setItem("bossparty_me", meId); else localStorage.removeItem("bossparty_me");
  renderSchedule();
});

function renderAll(){ renderPool(); renderBoard(); if(view==="sched") renderSchedule(); scheduleSave(); }

async function init(){
  setStatus("loading");
  let ok = await cloudLoad();
  if(!ok){ const cached = localStorage.getItem(LS_KEY); if(cached){ try { ok = applyState(JSON.parse(cached)); } catch(e){} } }
  reseedCounters(); renderPool(); renderBoard(); loaded = true;
  setStatus(ok ? "saved" : "local");
}
init();
</script>
