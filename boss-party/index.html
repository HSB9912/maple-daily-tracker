<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>보스 파티 편성판 · Boss Party Board</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e1016; --panel: #171a23; --panel-2: #1e222e;
    --line: #2a2f3d; --line-2: #363c4d;
    --text: #e7e9ee; --muted: #8b90a0; --muted-2: #6a6f7e;
    --accent: #6c8cff; --accent-soft: #6c8cff22;
    --good: #4ecb8d; --warn: #f0b45e; --danger: #f06e6e;
    --solo: #f0b45e; --duo: #6c8cff; --trio: #b06cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: 13px;
  }
  .en { font-size: 0.72em; color: var(--muted-2); font-weight: 400; }

  header { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 14px; font-weight: 700; }
  header .spacer { margin-left: auto; }
  .sync { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
  .sync .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-2); transition: 0.2s; }
  .sync.saved .dot { background: var(--good); } .sync.saved { color: var(--good); }
  .sync.saving .dot { background: var(--warn); } .sync.saving { color: var(--warn); }
  .sync.local .dot { background: var(--muted); } .sync.local { color: var(--muted); }
  .sync.error .dot { background: var(--danger); } .sync.error { color: var(--danger); }
  .btn.saved { background: var(--good); border-color: var(--good); color: #08130d; }

  .btn { border: 1px solid var(--line-2); background: var(--panel-2); color: var(--text); border-radius: 7px; padding: 6px 11px; font-size: 12.5px; cursor: pointer; transition: 0.12s; font-family: inherit; }
  .btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.ghost { background: transparent; }
  .btn.sm { padding: 4px 8px; font-size: 11.5px; border-radius: 6px; }

  .app { display: flex; flex: 1; min-height: 0; }

  /* ===== Left roster ===== */
  .pool { width: 200px; flex-shrink: 0; border-right: 1px solid var(--line); background: var(--panel); display: flex; flex-direction: column; }
  .pool-head { padding: 9px 11px 7px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 6px; }
  .pool-head h2 { font-size: 12.5px; }
  .pool-head .big { margin-left: auto; font-size: 12.5px; font-weight: 800; }
  .pool-list { flex: 1; overflow-y: auto; padding: 5px 7px; display: flex; flex-direction: column; gap: 1px; }
  .member { display: flex; align-items: center; gap: 7px; border: 1px solid transparent; border-radius: 6px; padding: 4px 7px; cursor: grab; transition: 0.1s; user-select: none; }
  .member:hover { background: var(--panel-2); border-color: var(--line); }
  .member.dragging { opacity: 0.4; }
  .member .nick { flex: 1; min-width: 0; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member .hexa { font-size: 10.5px; color: var(--muted-2); flex-shrink: 0; }
  .member .bpill { font-size: 9.5px; font-weight: 700; color: var(--accent); flex-shrink: 0; min-width: 24px; text-align: right; }
  .member .bpill.zero { color: var(--muted-2); }
  .member .del-m { color: var(--muted-2); cursor: pointer; font-size: 11px; flex-shrink: 0; opacity: 0; }
  .member:hover .del-m { opacity: 1; }
  .member .del-m:hover { color: var(--danger); }
  .pool-foot { border-top: 1px solid var(--line); padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  .add-form .row { display: flex; gap: 5px; margin-bottom: 5px; }
  input.fld { flex: 1; background: var(--bg); border: 1px solid var(--line-2); border-radius: 6px; padding: 6px 8px; color: var(--text); font-size: 12px; font-family: inherit; min-width: 0; }
  input.fld:focus { outline: none; border-color: var(--accent); }
  input.fld.hexa { max-width: 72px; }

  /* ===== Right board : compact horizontal boss rows ===== */
  .board { flex: 1; overflow-y: auto; padding: 2px 12px 16px; }
  .boss-sec { display: flex; align-items: flex-start; gap: 10px; padding: 7px 4px; border-bottom: 1px solid var(--line); }
  .boss-sec:last-child { border-bottom: none; }

  .bsec-info { width: 150px; flex-shrink: 0; }
  .bsec-info .r1 { display: flex; align-items: flex-start; gap: 6px; }
  .bsec-info .bname { flex: 1; min-width: 0; font-size: 13px; font-weight: 800; cursor: pointer; word-break: break-all; line-height: 1.25; }
  .bsec-info .bname:hover { color: var(--accent); }
  .bsec-info .diff { cursor: pointer; }
  .diff { font-size: 9.5px; font-weight: 800; padding: 1px 6px; border-radius: 5px; border: 1px solid var(--dc, var(--muted-2)); color: var(--dc, var(--muted-2)); line-height: 1.35; flex-shrink: 0; }
  .bsec-info .del-boss { color: var(--muted-2); background: none; border: none; cursor: pointer; font-size: 12px; opacity: 0; flex-shrink: 0; }
  .boss-sec:hover .del-boss { opacity: 1; }
  .bsec-info .del-boss:hover { color: var(--danger); }
  .bsec-info .r2 { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .bsec-info .prog { font-size: 10.5px; color: var(--muted); }
  .bsec-info .prog.done { color: var(--good); font-weight: 700; }
  .addp { display: flex; gap: 3px; margin-top: 5px; }
  .addp button { font-size: 10.5px; padding: 2px 6px; border-radius: 5px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line-2); color: var(--muted); font-family: inherit; display: flex; align-items: center; gap: 3px; }
  .addp button:hover { color: var(--text); border-color: var(--accent); }
  .addp .sw { width: 7px; height: 7px; border-radius: 2px; }

  .bsec-parties { flex: 1; display: flex; flex-wrap: wrap; gap: 5px; align-items: flex-start; padding-top: 1px; }
  .party { display: flex; align-items: center; gap: 4px; padding: 3px 6px 3px 5px; border: 1px solid var(--line); border-left: 3px solid var(--tone); border-radius: 7px; background: var(--panel); }
  .party .tag { font-size: 9px; font-weight: 800; color: var(--tone); flex-shrink: 0; letter-spacing: 0.02em; }
  .party .sum { font-size: 9px; color: var(--muted-2); flex-shrink: 0; }
  .party .del-p { color: var(--muted-2); background: none; border: none; cursor: pointer; font-size: 10px; flex-shrink: 0; padding: 0 1px; }
  .party .del-p:hover { color: var(--danger); }
  .party.over { border-color: var(--tone); box-shadow: 0 0 0 1px var(--tone); }

  .token { display: flex; align-items: center; gap: 4px; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 5px; padding: 2px 4px 2px 6px; cursor: grab; user-select: none; }
  .token .nick { font-size: 11px; font-weight: 600; white-space: nowrap; }
  .token .hx { font-size: 9px; color: var(--muted-2); }
  .token .rm { color: var(--muted-2); cursor: pointer; font-size: 10px; }
  .token .rm:hover { color: var(--danger); }
  .slot-mini { min-width: 24px; height: 21px; border: 1px dashed var(--line-2); border-radius: 5px; display: grid; place-items: center; color: var(--muted-2); font-size: 12px; }
  .slot-mini.over { border-color: var(--tone); background: var(--tone-soft); color: var(--tone); }

  .un-inline { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding: 2px 6px; border: 1px dashed var(--line-2); border-radius: 7px; background: #ffffff05; }
  .un-inline.over { border-color: var(--accent); background: var(--accent-soft); }
  .un-inline .ttl { font-size: 10px; font-weight: 700; color: var(--warn); flex-shrink: 0; }
  .un-inline .ttl.done { color: var(--good); }
  .un-inline .token { background: var(--bg); }

  .board-empty { color: var(--muted-2); font-size: 12.5px; text-align: center; margin: 50px auto; line-height: 1.7; }

  .modal-bg { position: fixed; inset: 0; background: #0009; display: none; align-items: center; justify-content: center; z-index: 50; }
  .modal-bg.on { display: flex; }
  .modal { width: 320px; background: var(--panel); border: 1px solid var(--line-2); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .modal h3 { font-size: 14px; }
  .modal label { font-size: 11px; color: var(--muted-2); display: block; margin-bottom: 5px; }
  .diff-seg { display: flex; gap: 5px; flex-wrap: wrap; }
  .diff-seg button { flex: 1; min-width: 54px; padding: 7px 0; font-size: 12px; font-weight: 700; border-radius: 7px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line-2); color: var(--muted); font-family: inherit; }
  .diff-seg button.on { background: var(--dc)22; border-color: var(--dc); color: var(--dc); }
  .modal .actions { display: flex; gap: 7px; justify-content: flex-end; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2c3242; border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <header>
    <h1>보스 파티 편성판</h1>
    <div class="spacer"></div>
    <div class="sync" id="sync"><span class="dot"></span><span id="sync-txt">연결 중…</span></div>
    <button class="btn primary sm" id="btn-save">저장</button>
    <button class="btn ghost sm" id="btn-reload" title="클라우드에서 최신 불러오기">새로고침</button>
    <button class="btn ghost sm" id="btn-add-boss">+ 보스</button>
  </header>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h3 id="modal-title">보스 추가</h3>
      <div><label>보스 이름</label><input class="fld" id="nb-name" placeholder="예: 검은마법사" style="width:100%" /></div>
      <div><label>난이도</label><div class="diff-seg" id="nb-diff"></div></div>
      <div class="actions">
        <button class="btn ghost" id="nb-cancel">취소</button>
        <button class="btn primary" id="nb-ok">추가</button>
      </div>
    </div>
  </div>

  <div class="app">
    <aside class="pool">
      <div class="pool-head"><h2>전체 멤버</h2><span class="en">Roster</span><span class="big" id="roster-count">0</span></div>
      <div class="pool-list" id="pool-list"></div>
      <div class="pool-foot">
        <div class="add-form">
          <div class="row">
            <input class="fld" id="in-nick" placeholder="닉네임" />
            <input class="fld hexa" id="in-hexa" placeholder="헥사" inputmode="numeric" />
          </div>
          <button class="btn primary" id="btn-add-member" style="width:100%">+ 멤버 추가</button>
        </div>
      </div>
    </aside>
    <div class="board" id="board"></div>
  </div>

<script>
/* ===== Supabase (기존 프로젝트 재사용 · 새 테이블로 격리) ===== */
const SUPABASE_URL = 'https://lapxytabpabdkomjspta.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhcHh5dGFicGFiZGtvbWpzcHRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODM5OTcsImV4cCI6MjA5MTY1OTk5N30.tU4zbHkbM-fan_MIeV0bqjMu8Z_LKkj335YrdnKMVR8';
const TABLE = 'boss_party_state';
const ROW_ID = 'main';
const LS_KEY = 'bossparty_state';
let _supabase = null;
try { _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { console.warn('supabase init 실패', e); }

const SIZE_META = { 1:{label:"솔격",tone:"var(--solo)",soft:"#f0b45e22"}, 2:{label:"2인",tone:"var(--duo)",soft:"#6c8cff22"}, 3:{label:"3인",tone:"var(--trio)",soft:"#b06cff22"} };
const DIFFS = ["이지","노말","하드","카오스","익스트림"];
const DIFF_COLOR = { "이지":"#4ecb8d","노말":"#8b90a0","하드":"#f0b45e","카오스":"#b06cff","익스트림":"#f06e6e" };

let members = [];
let bosses = [];
let mid=1, bid=1, pid=1, loaded=false, saveTimer=null;

const fmt = n => (n||0).toLocaleString("ko-KR");
const byId = id => members.find(m => m.id === id);
const escapeHtml = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

function assignedIds(boss){ const s=new Set(); boss.parties.forEach(p=>p.seats.forEach(x=>{if(x)s.add(x);})); return s; }
function unassignedFor(boss){ const a=assignedIds(boss); return members.filter(m=>!a.has(m.id)).sort((x,y)=>y.hexa-x.hexa); }
function pullFromBoss(boss, mId){ boss.parties.forEach(p=>p.seats=p.seats.map(x=>x===mId?null:x)); }
function bossesOf(mId){ return bosses.filter(b=>assignedIds(b).has(mId)).length; }

/* ===== Persistence ===== */
function serialize(){ return { members, bosses, v:1 }; }
function applyState(s){
  if(!s) return false;
  members = Array.isArray(s.members) ? s.members : [];
  bosses  = Array.isArray(s.bosses) ? s.bosses.map(b=>({ ...b, parties:(b.parties||[]).map(p=>({ ...p, seats:Array.isArray(p.seats)?p.seats:[] })) })) : [];
  return true;
}
function reseedCounters(){
  const num = id => parseInt(String(id).replace(/\D/g,''),10) || 0;
  mid = Math.max(1, ...members.map(m=>num(m.id)+1));
  bid = Math.max(1, ...bosses.map(b=>num(b.id)+1));
  let pmax = 1; bosses.forEach(b=>b.parties.forEach(p=>{ pmax=Math.max(pmax, num(p.id)+1); })); pid = pmax;
}
function setStatus(state){
  const el = document.getElementById("sync");
  const txt = { saving:"저장 중…", saved:"클라우드 저장됨", local:"로컬 저장됨", error:"저장 실패", loading:"불러오는 중…" }[state] || "";
  el.className = "sync " + (state==="loading" ? "" : state);
  document.getElementById("sync-txt").textContent = txt;
}
function scheduleSave(){
  if(!loaded) return;
  try { localStorage.setItem(LS_KEY, JSON.stringify(serialize())); } catch(e){}
  setStatus("saving"); clearTimeout(saveTimer); saveTimer = setTimeout(cloudSave, 700);
}
// 클라우드 저장 성공 여부를 반환 (실패해도 로컬은 이미 저장됨)
async function cloudSave(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(serialize())); } catch(e){}
  if(!_supabase){ setStatus("local"); return false; }
  try {
    const { error } = await _supabase.from(TABLE).upsert({ id: ROW_ID, data: serialize() }, { onConflict:'id' });
    if(error){ setStatus("local"); console.warn(error); return false; }
    setStatus("saved"); return true;
  } catch(e){ setStatus("local"); console.warn(e); return false; }
}
async function cloudLoad(){
  if(!_supabase) return false;
  try { const { data, error } = await _supabase.from(TABLE).select('data').eq('id', ROW_ID).single(); if(!error && data && data.data) return applyState(data.data); }
  catch(e){ console.warn(e); }
  return false;
}

/* ===== Left roster ===== */
function renderPool(){
  const list = document.getElementById("pool-list");
  document.getElementById("roster-count").textContent = members.length;
  list.innerHTML = "";
  if(!members.length){ list.innerHTML='<div style="color:var(--muted-2);font-size:11.5px;padding:8px 4px">아래에서 멤버를 추가하세요.</div>'; return; }
  members.slice().sort((a,b)=>b.hexa-a.hexa).forEach(m=>{
    const cnt = bossesOf(m.id);
    const el = document.createElement("div");
    el.className="member"; el.draggable=true;
    el.innerHTML = `<span class="nick">${escapeHtml(m.nick)}</span><span class="hexa">${fmt(m.hexa)}</span><span class="bpill ${cnt?"":"zero"}" title="배정된 보스 수">${cnt}/${bosses.length}</span><span class="del-m" title="삭제">✕</span>`;
    el.addEventListener("dragstart", e=>{ e.dataTransfer.setData("mid", m.id); el.classList.add("dragging"); });
    el.addEventListener("dragend", ()=>el.classList.remove("dragging"));
    el.querySelector(".del-m").addEventListener("click", ()=>{
      if(!confirm(`'${m.nick}' 멤버를 삭제할까요? 모든 보스에서 빠집니다.`)) return;
      members = members.filter(x=>x.id!==m.id); bosses.forEach(b=>pullFromBoss(b,m.id)); renderAll();
    });
    list.appendChild(el);
  });
}

/* ===== Right board ===== */
function renderBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  if(!bosses.length){ board.innerHTML='<div class="board-empty">아직 보스가 없어요.<br>오른쪽 위 <b>+ 보스</b>로 시작하세요.</div>'; return; }
  bosses.forEach(b=>board.appendChild(bossSection(b)));
}

function bossSection(boss){
  const total = members.length, done = assignedIds(boss).size, complete = total>0 && done===total;
  const dc = DIFF_COLOR[boss.diff] || "var(--muted-2)";
  const sec = document.createElement("div"); sec.className="boss-sec";

  const info = document.createElement("div"); info.className="bsec-info";
  info.innerHTML = `
    <div class="r1">
      <span class="bname" title="클릭하여 이름·난이도 수정">${escapeHtml(boss.name)}</span>
      <button class="del-boss" title="편성판 삭제">✕</button>
    </div>
    <div class="r2">
      <span class="diff" style="--dc:${dc}" title="클릭하여 이름·난이도 수정">${escapeHtml(boss.diff||"")}</span>
      <span class="prog ${complete?"done":""}">${done}/${total} 배정</span>
    </div>
    <div class="addp">
      <button data-add="1"><span class="sw" style="background:var(--solo)"></span>솔격</button>
      <button data-add="2"><span class="sw" style="background:var(--duo)"></span>2인</button>
      <button data-add="3"><span class="sw" style="background:var(--trio)"></span>3인</button>
    </div>`;
  info.querySelector(".del-boss").addEventListener("click", ()=>{
    if(!confirm(`'${boss.name} ${boss.diff}' 편성판을 삭제할까요?`)) return;
    bosses = bosses.filter(x=>x.id!==boss.id); renderAll();
  });
  info.querySelector(".bname").addEventListener("click", ()=>openEditBoss(boss));
  info.querySelector(".diff").addEventListener("click", ()=>openEditBoss(boss));
  info.querySelectorAll("[data-add]").forEach(btn=>btn.addEventListener("click", ()=>{
    const size=+btn.dataset.add; boss.parties.push({ id:"p"+(pid++), size, seats:Array(size).fill(null) }); renderAll();
  }));
  sec.appendChild(info);

  const parts = document.createElement("div"); parts.className="bsec-parties";
  boss.parties.forEach(p=>parts.appendChild(partyEl(boss,p)));
  parts.appendChild(unassignedInline(boss));
  sec.appendChild(parts);
  return sec;
}

function partyEl(boss,p){
  const meta = SIZE_META[p.size];
  const filled = p.seats.filter(Boolean);
  const total = filled.reduce((s,id)=>s+(byId(id)?.hexa||0),0);
  const el = document.createElement("div");
  el.className="party"; el.style.setProperty("--tone",meta.tone); el.style.setProperty("--tone-soft",meta.soft);
  const tag = document.createElement("span"); tag.className="tag"; tag.textContent=meta.label; el.appendChild(tag);
  p.seats.forEach((mId,i)=>el.appendChild(seatEl(boss,p,i,mId)));
  const sum = document.createElement("span"); sum.className="sum"; sum.textContent = total?fmt(total):""; el.appendChild(sum);
  const del = document.createElement("button"); del.className="del-p"; del.title="파티 삭제"; del.textContent="✕";
  del.addEventListener("click", ()=>{ boss.parties=boss.parties.filter(x=>x.id!==p.id); renderAll(); });
  el.appendChild(del);
  // 파티 전체에 드롭 => 첫 빈 자리 채우기
  el.addEventListener("dragover", e=>{ e.preventDefault(); el.classList.add("over"); });
  el.addEventListener("dragleave", ()=>el.classList.remove("over"));
  el.addEventListener("drop", e=>{
    e.preventDefault(); el.classList.remove("over");
    const m2 = e.dataTransfer.getData("mid"); if(!m2) return;
    const empty = p.seats.indexOf(null);
    if(empty<0 && !p.seats.includes(m2)) return;   // 자리 없음
    pullFromBoss(boss, m2);
    const slot = p.seats.indexOf(null); p.seats[slot<0?0:slot] = m2; renderAll();
  });
  return el;
}

function seatEl(boss,p,i,mId){
  if(mId){
    const m = byId(mId);
    if(!m){ p.seats[i]=null; }
    else {
      const t = document.createElement("div"); t.className="token"; t.draggable=true;
      t.innerHTML = `<span class="nick">${escapeHtml(m.nick)}</span><span class="hx">${fmt(m.hexa)}</span><span class="rm" title="빼기">✕</span>`;
      t.addEventListener("dragstart", e=>{ e.stopPropagation(); e.dataTransfer.setData("mid", mId); });
      t.querySelector(".rm").addEventListener("click", e=>{ e.stopPropagation(); p.seats[i]=null; renderAll(); });
      return t;
    }
  }
  const slot = document.createElement("div"); slot.className="slot-mini"; slot.textContent="+";
  slot.style.setProperty("--tone",SIZE_META[p.size].tone); slot.style.setProperty("--tone-soft",SIZE_META[p.size].soft);
  slot.addEventListener("dragover", e=>{ e.preventDefault(); e.stopPropagation(); slot.classList.add("over"); });
  slot.addEventListener("dragleave", ()=>slot.classList.remove("over"));
  slot.addEventListener("drop", e=>{
    e.preventDefault(); e.stopPropagation(); slot.classList.remove("over");
    const m2 = e.dataTransfer.getData("mid"); if(!m2) return;
    pullFromBoss(boss, m2); p.seats[i]=m2; renderAll();
  });
  return slot;
}

function unassignedInline(boss){
  const un = unassignedFor(boss);
  const box = document.createElement("div"); box.className="un-inline";
  const ttl = document.createElement("span"); ttl.className="ttl"+(un.length?"":" done");
  ttl.textContent = un.length ? `미배정 ${un.length}` : (members.length?"✓ 완료":"미배정 0");
  box.appendChild(ttl);
  un.forEach(m=>{
    const t = document.createElement("div"); t.className="token"; t.draggable=true;
    t.innerHTML = `<span class="nick">${escapeHtml(m.nick)}</span><span class="hx">${fmt(m.hexa)}</span>`;
    t.addEventListener("dragstart", e=>{ e.dataTransfer.setData("mid", m.id); });
    box.appendChild(t);
  });
  box.addEventListener("dragover", e=>{ e.preventDefault(); box.classList.add("over"); });
  box.addEventListener("dragleave", ()=>box.classList.remove("over"));
  box.addEventListener("drop", e=>{
    e.preventDefault(); box.classList.remove("over");
    const m2 = e.dataTransfer.getData("mid"); if(!m2) return;
    pullFromBoss(boss, m2); renderAll();
  });
  return box;
}

/* ===== Add / Edit boss modal ===== */
let nbDiff = "노말";
let editingBossId = null;
function buildDiffSeg(){
  const seg = document.getElementById("nb-diff"); seg.innerHTML="";
  DIFFS.forEach(d=>{
    const b=document.createElement("button"); b.textContent=d; b.style.setProperty("--dc",DIFF_COLOR[d]);
    if(d===nbDiff) b.classList.add("on");
    b.addEventListener("click", ()=>{ nbDiff=d; buildDiffSeg(); });
    seg.appendChild(b);
  });
}
function openModal(){ buildDiffSeg(); document.getElementById("modal-bg").classList.add("on"); const n=document.getElementById("nb-name"); n.focus(); n.select(); }
function openAddBoss(){
  editingBossId = null; nbDiff = "노말";
  document.getElementById("modal-title").textContent = "보스 추가";
  document.getElementById("nb-ok").textContent = "추가";
  document.getElementById("nb-name").value = "";
  openModal();
}
function openEditBoss(boss){
  editingBossId = boss.id; nbDiff = boss.diff || "노말";
  document.getElementById("modal-title").textContent = "보스 수정";
  document.getElementById("nb-ok").textContent = "저장";
  document.getElementById("nb-name").value = boss.name;
  openModal();
}
function closeAddBoss(){ document.getElementById("modal-bg").classList.remove("on"); }
document.getElementById("btn-add-boss").addEventListener("click", openAddBoss);
document.getElementById("nb-cancel").addEventListener("click", closeAddBoss);
document.getElementById("modal-bg").addEventListener("click", e=>{ if(e.target.id==="modal-bg") closeAddBoss(); });
document.getElementById("nb-name").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("nb-ok").click(); });
document.getElementById("nb-ok").addEventListener("click", ()=>{
  const name = document.getElementById("nb-name").value.trim(); if(!name){ document.getElementById("nb-name").focus(); return; }
  if(editingBossId){
    const b = bosses.find(x=>x.id===editingBossId);
    if(b){ b.name = name; b.diff = nbDiff; }
  } else {
    bosses.push({ id:"b"+(bid++), name, diff:nbDiff, parties:[] });
  }
  closeAddBoss(); renderAll();
});

/* ===== Member add ===== */
document.getElementById("btn-add-member").addEventListener("click", addMember);
document.getElementById("in-nick").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("in-hexa").focus(); });
document.getElementById("in-hexa").addEventListener("keydown", e=>{ if(e.key==="Enter") addMember(); });
function addMember(){
  const nick = document.getElementById("in-nick").value.trim();
  const hexa = parseInt(document.getElementById("in-hexa").value.replace(/[^\d]/g,""),10)||0;
  if(!nick) return;
  members.push({ id:"m"+(mid++), nick, hexa });
  document.getElementById("in-nick").value=""; document.getElementById("in-hexa").value="";
  document.getElementById("in-nick").focus(); renderAll();
}

document.getElementById("btn-reload").addEventListener("click", async ()=>{
  setStatus("loading"); const ok = await cloudLoad(); reseedCounters(); renderPool(); renderBoard(); setStatus(ok?"saved":"local");
});

// 수동 저장 버튼 — 지금 즉시 저장 + 확인 표시
document.getElementById("btn-save").addEventListener("click", async ()=>{
  const btn = document.getElementById("btn-save");
  clearTimeout(saveTimer);
  btn.textContent = "저장 중…";
  const ok = await cloudSave();
  btn.textContent = ok ? "저장됨 ✓" : "로컬 저장됨 ✓";
  btn.classList.add("saved");
  setTimeout(()=>{ btn.textContent="저장"; btn.classList.remove("saved"); }, 1400);
});

function renderAll(){ renderPool(); renderBoard(); scheduleSave(); }

async function init(){
  setStatus("loading");
  let ok = await cloudLoad();
  if(!ok){ const cached = localStorage.getItem(LS_KEY); if(cached){ try { ok = applyState(JSON.parse(cached)); } catch(e){} } }
  reseedCounters(); renderPool(); renderBoard(); loaded = true;
  setStatus(ok ? "saved" : "local");
}
init();
</script>
