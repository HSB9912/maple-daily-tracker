// --- 대시보드 ---
function renderDashboard() {
  const wrap = document.getElementById('dashboard');
  if (!_cloudData || !_cloudData.users) { wrap.innerHTML = ''; return; }

  const username = getCurrentUser();
  const data = loadData();

  // 이번주 수입 (목~수 기준)
  const now = new Date();
  const day = now.getDay();
  const diff = (day - 4 + 7) % 7;
  const thu = new Date(now);
  thu.setDate(now.getDate() - diff);
  const thuStr = `${thu.getFullYear()}-${String(thu.getMonth()+1).padStart(2,'0')}-${String(thu.getDate()).padStart(2,'0')}`;
  let weekMeso = 0, weekDajo = 0, allMeso = 0, allDajoEarned = 0;
  Object.keys(data.records || {}).forEach(date => {
    (data.characters || []).forEach(ch => {
      const mesoRec = data.records[date]?.[ch]?.['매소'];
      const dajoRec = data.records[date]?.[ch]?.['다조'];
      const mesoEarned = mesoRec ? getEarned(mesoRec) : 0;
      const dajoEarned = dajoRec ? getEarned(dajoRec) : 0;
      allMeso += mesoEarned;
      allDajoEarned += dajoEarned;
      if (date >= thuStr) {
        weekMeso += mesoEarned;
        weekDajo += dajoEarned;
      }
    });
  });

  let mesoIncome = 0, mesoExpense = 0, dajoIncome = 0, dajoExpense = 0;
  let weekMesoIncome = 0, weekMesoExpense = 0, weekDajoIncome = 0, weekDajoExpense = 0;
  (data.ledger || []).forEach(entry => {
    const amt = Number(entry.amount) || 0;
    const isThisWeek = entry.date >= thuStr;
    if (entry.currency === 'dajo') {
      if (entry.type === 'income') dajoIncome += amt; else dajoExpense += amt;
      if (isThisWeek) { if (entry.type === 'income') weekDajoIncome += amt; else weekDajoExpense += amt; }
    } else {
      if (entry.type === 'income') mesoIncome += amt; else mesoExpense += amt;
      if (isThisWeek) { if (entry.type === 'income') weekMesoIncome += amt; else weekMesoExpense += amt; }
    }
  });

  const dajoPrice = getDajoPrice();
  // 이번주 순이익
  const weekTotalDajo = weekDajo + weekDajoIncome - weekDajoExpense;
  const weekDajoMeso = weekTotalDajo * dajoPrice;
  const weekNet = weekMeso + weekMesoIncome - weekMesoExpense + weekDajoMeso;
  const weekNetColor = weekNet > 0 ? '#ef4444' : weekNet < 0 ? '#60a5fa' : '#C1C2C5';
  // 전체 순이익 (재획 + 가계부 전체)
  const allDajo = allDajoEarned + dajoIncome - dajoExpense;
  const allDajoMeso = allDajo * dajoPrice;
  const allNet = allMeso + mesoIncome - mesoExpense + allDajoMeso;
  const allNetColor = allNet > 0 ? '#ef4444' : allNet < 0 ? '#60a5fa' : '#C1C2C5';

  // 순 메소 (재획 + 가계부)
  const weekMesoNet = weekMeso + weekMesoIncome - weekMesoExpense;
  const weekMesoNetColor = weekMesoNet > 0 ? '#ef4444' : weekMesoNet < 0 ? '#60a5fa' : '#C1C2C5';
  const allMesoNet = allMeso + mesoIncome - mesoExpense;
  const allMesoNetColor = allMesoNet > 0 ? '#ef4444' : allMesoNet < 0 ? '#60a5fa' : '#C1C2C5';
  // 순 다조 (재획 + 가계부)
  const weekDajoNet = weekDajo + weekDajoIncome - weekDajoExpense;
  const allDajoNet = allDajoEarned + dajoIncome - dajoExpense;

  let html = '';
  // 카드 1: 이번주 순 메소
  html += `<div class="dash-card"><div class="dash-label"><img src="meso.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">이번주 메소</div>`;
  html += `<div class="dash-value" style="color:${weekMesoNetColor}">${formatMeso(weekMesoNet)}</div>`;
  html += `<div style="font-size:10px;color:#5c5f66">재획 ${formatMesoShort(weekMeso)}</div>`;
  if (weekMesoIncome || weekMesoExpense) html += `<div style="font-size:10px;color:#5c5f66">가계부 ${weekMesoIncome ? '+' + formatMesoShort(weekMesoIncome) : ''}${weekMesoExpense ? ' -' + formatMesoShort(weekMesoExpense) : ''}</div>`;
  html += `<div class="dash-sub">${thuStr} ~</div></div>`;
  // 카드 2: 이번주 순 다조
  html += `<div class="dash-card"><div class="dash-label"><img src="dajo.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">이번주 다조</div>`;
  html += `<div class="dash-value" style="color:#a78bfa">${weekDajoNet >= 0 ? '+' : ''}${weekDajoNet}개</div>`;
  html += `<div style="font-size:10px;color:#5c5f66">재획 +${weekDajo}</div>`;
  if (weekDajoIncome || weekDajoExpense) html += `<div style="font-size:10px;color:#5c5f66">가계부 ${weekDajoIncome ? '+' + weekDajoIncome : ''}${weekDajoExpense ? ' -' + weekDajoExpense : ''}</div>`;
  html += `<div class="dash-sub">${thuStr} ~</div></div>`;
  // 카드 3: 전체 순 메소
  html += `<div class="dash-card"><div class="dash-label"><img src="meso.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">전체 메소</div>`;
  html += `<div class="dash-value" style="color:${allMesoNetColor}">${formatMeso(allMesoNet)}</div>`;
  html += `<div style="font-size:10px;color:#5c5f66">재획 ${formatMesoShort(allMeso)}</div>`;
  if (mesoIncome || mesoExpense) html += `<div style="font-size:10px;color:#5c5f66">가계부 ${mesoIncome ? '+' + formatMesoShort(mesoIncome) : ''}${mesoExpense ? ' -' + formatMesoShort(mesoExpense) : ''}</div>`;
  html += `</div>`;
  // 카드 4: 전체 순 다조
  html += `<div class="dash-card"><div class="dash-label"><img src="dajo.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">전체 다조</div>`;
  html += `<div class="dash-value" style="color:#a78bfa">${allDajoNet >= 0 ? '+' : ''}${allDajoNet}개</div>`;
  html += `<div style="font-size:10px;color:#5c5f66">재획 +${allDajoEarned}</div>`;
  if (dajoIncome || dajoExpense) html += `<div style="font-size:10px;color:#5c5f66">가계부 ${dajoIncome ? '+' + dajoIncome : ''}${dajoExpense ? ' -' + dajoExpense : ''}</div>`;
  html += `</div>`;

  // 카드 5,6: 현재 잔고 (최신 balanceLog 기준)
  const balLogDates = Object.keys(data.balanceLog || {}).sort();
  const latestBalDate = balLogDates[balLogDates.length - 1];
  const latestBal = latestBalDate ? data.balanceLog[latestBalDate] : null;
  const currentMeso = latestBal ? (latestBal.meso || 0) : 0;
  const currentDajo = latestBal ? (latestBal.dajo || 0) : 0;

  html += `<div class="dash-card"><div class="dash-label"><img src="meso.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">현재 메소</div>`;
  html += `<div class="dash-value" style="color:#fbbf24">${formatMeso(currentMeso)}</div>`;
  html += `<div class="dash-sub">${latestBalDate || '기록 없음'}</div></div>`;

  html += `<div class="dash-card"><div class="dash-label"><img src="dajo.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">현재 다조</div>`;
  html += `<div class="dash-value" style="color:#fbbf24">${currentDajo}개</div>`;
  html += `<div class="dash-sub">${latestBalDate || '기록 없음'}</div></div>`;

  wrap.innerHTML = html;
}

// --- 수입/지출 장부 (억 단위) ---
function parseMeso(str) {
  const num = parseFloat(str.trim().replace(/[^0-9.\-]/g, ''));
  if (isNaN(num)) return 0;
  return Math.round(num * 100000000);
}

function setLedgerType(currency, type) {
  const wrap = document.getElementById(currency === 'meso' ? 'mesoTypeBtns' : 'dajoTypeBtns');
  wrap.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.val === type));
}

function getLedgerType(currency) {
  const wrap = document.getElementById(currency === 'meso' ? 'mesoTypeBtns' : 'dajoTypeBtns');
  const active = wrap.querySelector('.type-btn.active');
  return active ? active.dataset.val : 'income';
}

function addLedger() {
  const date = _selectedDate;
  const mesoType = getLedgerType('meso');
  const dajoType = getLedgerType('dajo');
  const mesoStr = document.getElementById('ledgerMesoAmt').value;
  const dajoStr = document.getElementById('ledgerDajoAmt').value;
  const memo = document.getElementById('ledgerMemo').value.trim();
  const mesoAmt = parseMeso(mesoStr);
  const dajoAmt = Math.round(Number(dajoStr.replace(/[^0-9.\-]/g, '')) || 0);
  if (!date || (!mesoAmt && !dajoAmt)) { toast('금액을 입력하세요.', 'error'); return; }
  const data = loadData();
  if (!data.ledger) data.ledger = [];
  const category = document.getElementById('ledgerCategory').value;
  if (mesoAmt) {
    data.ledger.push({ date, type: mesoType, currency: 'meso', amount: mesoAmt, memo, category, id: Date.now() });
  }
  if (dajoAmt) {
    data.ledger.push({ date, type: dajoType, currency: 'dajo', amount: dajoAmt, memo, category, id: Date.now() + 1 });
  }
  data.ledger.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  saveData(data);
  document.getElementById('ledgerMesoAmt').value = '';
  document.getElementById('ledgerDajoAmt').value = '';
  document.getElementById('ledgerMemo').value = '';
  renderLedger();
  renderDashboard();
  renderAssetCalendar();
  toast('추가됨');
}

function editLedgerDate(id, td) {
  const data = loadData();
  const entry = (data.ledger || []).find(e => e.id === id);
  if (!entry) return;
  const input = document.createElement('input');
  input.type = 'date';
  input.value = entry.date;
  input.style.cssText = 'background:#1B2030;border:1px solid #1971c2;color:#C1C2C5;border-radius:3px;padding:2px;font-size:11px;width:100%;font-family:inherit;';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  function save() {
    if (input.value) entry.date = input.value;
    saveData(data);
    renderLedger();
    renderDashboard();
    renderAssetCalendar();
  }
  input.addEventListener('change', save);
  input.addEventListener('blur', save);
}

function editLedger(id, field, value) {
  const data = loadData();
  const entry = (data.ledger || []).find(e => e.id === id);
  if (!entry) return;
  entry[field] = value;
  saveData(data);
  renderLedger();
  renderDashboard();
  renderAssetCalendar();
}

function editLedgerType(id) {
  const data = loadData();
  const entry = (data.ledger || []).find(e => e.id === id);
  if (!entry) return;
  entry.type = entry.type === 'income' ? 'expense' : 'income';
  saveData(data);
  renderLedger();
  renderDashboard();
  renderAssetCalendar();
}

function editLedgerCurrency(id) {
  const data = loadData();
  const entry = (data.ledger || []).find(e => e.id === id);
  if (!entry) return;
  entry.currency = entry.currency === 'dajo' ? 'meso' : 'dajo';
  saveData(data);
  renderLedger();
  renderDashboard();
  renderAssetCalendar();
}

function setLedgerCat(val) {
  document.getElementById('ledgerCategory').value = val;
  document.querySelectorAll('#ledgerCatBtns .type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === val);
  });
}

function editLedgerCategory(id) {
  const data = loadData();
  const entry = (data.ledger || []).find(e => e.id === id);
  if (!entry) return;
  const cats = ['보스','장비','강화','거래','기타'];
  const curr = entry.category || '기타';
  const idx = cats.indexOf(curr);
  entry.category = cats[(idx + 1) % cats.length];
  saveData(data);
  renderLedger();
}

function editLedgerAmount(id, td) {
  const data = loadData();
  const entry = (data.ledger || []).find(e => e.id === id);
  if (!entry) return;
  const isDajo = entry.currency === 'dajo';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = isDajo ? entry.amount : (entry.amount / 100000000);
  input.style.cssText = 'width:100%;background:#1B2030;border:1px solid #1971c2;color:#C1C2C5;padding:3px;font-size:12px;text-align:right;border-radius:3px;font-family:inherit;';
  input.placeholder = isDajo ? '개수' : '억 단위';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.select();
  function save() {
    const val = Number(input.value) || 0;
    entry.amount = isDajo ? val : Math.round(val * 100000000);
    saveData(data);
    renderLedger();
    renderDashboard();
    renderAssetCalendar();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
}

function editLedgerMemo(id, td) {
  const data = loadData();
  const entry = (data.ledger || []).find(e => e.id === id);
  if (!entry) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = entry.memo || '';
  input.style.cssText = 'width:100%;background:#1B2030;border:1px solid #1971c2;color:#C1C2C5;padding:3px;font-size:11px;border-radius:3px;font-family:inherit;';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  function save() {
    entry.memo = input.value;
    saveData(data);
    renderLedger();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
}

function deleteLedger(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  const data = loadData();
  data.ledger = (data.ledger || []).filter(e => e.id !== id);
  saveData(data);
  renderLedger();
  renderDashboard();
  renderAssetCalendar();
  toast('삭제됨');
}

function renderLedger() {
  const data = loadData();
  const wrap = document.getElementById('ledgerTableWrap');
  const ledger = data.ledger || [];

  // Show entries for selected month
  const selYear = _acYear;
  const selMonth = _acMonth;
  const monthLedger = ledger.filter(e => {
    const [y,m] = e.date.split('-').map(Number);
    return y === selYear && m === selMonth + 1;
  });

  if (!monthLedger.length) {
    wrap.innerHTML = `<div class="no-data">${selMonth+1}월 수입/지출 기록이 없습니다.</div>`;
    return;
  }

  const catEmoji = {'보스':'🗡️','장비':'⚔️','강화':'💎','거래':'🔄','기타':'📌'};
  let html = '<table class="sheet"><thead><tr>';
  html += '<th style="width:90px">날짜</th><th style="width:55px">분류</th><th style="width:35px"></th><th style="width:42px">구분</th><th>금액</th><th>메모</th><th style="width:28px"></th>';
  html += '</tr></thead><tbody>';

  monthLedger.forEach(e => {
    const isIncome = e.type === 'income';
    const isDajo = e.currency === 'dajo';
    const icon = isDajo ? '<img src="dajo.png" style="width:14px;height:14px;vertical-align:middle">' : '<img src="meso.png" style="width:14px;height:14px;vertical-align:middle">';
    const amtDisplay = isDajo ? `${isIncome ? '+' : '-'}${e.amount}개` : `${isIncome ? '+' : '-'}${formatNum(e.amount)}`;
    const typeBtnStyle = 'border:none;padding:2px 6px;font-size:10px;cursor:pointer;border-radius:3px;font-family:inherit;';
    const cat = e.category || '기타';
    const catIcon = catEmoji[cat] || '📌';
    html += `<tr>`;
    const shortDate = e.date.slice(5); // MM-DD
    html += `<td class="row-header" style="cursor:pointer;text-align:center;font-size:12px;" onclick="editLedgerDate(${e.id},this)" title="${e.date}">${shortDate}</td>`;
    html += `<td style="text-align:center;font-size:11px;cursor:pointer;color:#8F96A3" onclick="editLedgerCategory(${e.id})" title="클릭하여 변경">${catIcon} ${cat}</td>`;
    html += `<td style="text-align:center;font-size:11px;cursor:pointer" onclick="editLedgerCurrency(${e.id})">${icon}</td>`;
    html += `<td style="text-align:center;font-size:11px">`;
    html += `<button onclick="editLedgerType(${e.id})" style="${typeBtnStyle}background:${isIncome ? '#ef4444' : '#60a5fa'};color:#fff;">${isIncome ? '수입' : '지출'}</button>`;
    html += `</td>`;
    html += `<td style="text-align:right;padding:4px 6px;font-family:'MaplestoryOTFBold',Consolas,monospace;font-size:12px;color:${isIncome ? '#ef4444' : '#60a5fa'};cursor:pointer" onclick="editLedgerAmount(${e.id},this)">${amtDisplay}</td>`;
    html += `<td style="padding:4px 6px;color:#8F96A3;font-size:11px;cursor:pointer" onclick="editLedgerMemo(${e.id},this)">${e.memo || '<span style=color:#373A40>메모 추가</span>'}</td>`;
    html += `<td style="text-align:center"><button onclick="deleteLedger(${e.id})" style="border:none;background:none;color:#5c5f66;cursor:pointer;font-size:14px">✕</button></td>`;
    html += `</tr>`;
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// 창 닫기 전 미저장 경고
// Ctrl+S로 클라우드 저장
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
    e.preventDefault();
    e.stopPropagation();
    manualCloudSave();
    return false;
  }
}, true);

window.addEventListener('beforeunload', function(e) {
  if (_unsaved) {
    e.preventDefault();
    e.returnValue = '';
  }
});
