<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메이플 일일 재화 관리</title>
<link rel="icon" type="image/png" href="meso.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@font-face { font-family: 'MaplestoryOTFBold'; src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.1/MaplestoryOTFBold.woff') format('woff'); font-weight: normal; font-style: normal; }
@font-face { font-family: 'MaplestoryOTFLight'; src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.1/MaplestoryOTFLight.woff') format('woff'); font-weight: normal; font-style: normal; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'MaplestoryOTFLight', 'Pretendard', 'Noto Sans KR', sans-serif; background: #0C1019; color: #C1C2C5; min-height: 100vh; font-size: 14px; line-height: 1.5; letter-spacing: -0.3px; }

.app { max-width: 100%; margin: 0 auto; padding: 6px 8px; }
.header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
h1 { color: #FFFFFF; font-size: 1.2em; letter-spacing: -0.5px; }
.cloud-bar { display: flex; gap: 6px; }
.cloud-btn { padding: 6px 16px; border: 1px solid #373A40; border-radius: 4px; background: #131822; color: #8F96A3; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; font-family: inherit; }
.cloud-btn.unsaved { background: #1971c2; color: #fff; border-color: #1971c2; font-weight: 700; animation: pulse 1.5s infinite; }
.cloud-btn-load { color: #8F96A3; }
.cloud-btn:hover { background: #1864ab; color: #fff; }
.cloud-btn.unsaved:hover { background: #1864ab; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.user-tabs { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 2px; }
.user-tab { padding: 8px 18px; border: 1px solid #373A40; border-radius: 4px; background: #131822; color: #8F96A3; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; transition: all 0.15s; position: relative; font-family: inherit; }
.user-tab:hover { background: #1B2030; color: #C1C2C5; }
.user-tab.active { background: #1971c2; color: #fff; font-weight: 700; border-color: #1971c2; }
.user-tab .user-tab-x { display: none; margin-left: 6px; font-size: 11px; opacity: 0.6; }
.user-tab.active .user-tab-x { display: inline; }
.user-tab .user-tab-x:hover { opacity: 1; }
.user-tab-add { padding: 8px 14px; border: 1px dashed #373A40; border-radius: 4px; background: transparent; color: #8F96A3; cursor: pointer; font-size: 14px; font-family: inherit; }
.user-tab-add:hover { border-color: #1971c2; color: #1971c2; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 0; background: #1A1B1E; border-radius: 4px 4px 0 0; }
.tab { flex: 1; padding: 12px; text-align: center; background: transparent; border: none; color: #8F96A3; cursor: pointer; font-size: 14px; transition: all 0.15s; border-bottom: 2px solid transparent; font-family: inherit; }
.tab.active { color: #FFFFFF; font-weight: 600; border-bottom: 2px solid #1971c2; }
.tab:hover { color: #C1C2C5; }

.panel { display: none; background: #131822; border-radius: 0 0 4px 4px; padding: 8px; border: 1px solid #373A40; border-top: none; }
.panel.active { display: block; }

/* Spreadsheet */
.sheet-wrap { overflow: hidden; border: 1px solid #373A40; border-radius: 4px; }
.sheet { border-collapse: collapse; font-size: 12px; width: 100%; table-layout: fixed; }
.sheet th, .sheet td { border: 1px solid #373A40; padding: 0; white-space: nowrap; }
.sheet th { background: #1B2030; color: #9DA0AC; font-weight: 600; text-align: center; padding: 6px 4px; font-size: 12px; user-select: none; overflow: hidden; text-overflow: ellipsis; }
.sheet th.corner { background: #1B2030; }
.sheet td.row-header { background: #1B2030; color: #D7D8DD; padding: 2px 6px; font-size: 13px; font-weight: 700; white-space: nowrap; vertical-align: middle; }
.sheet td.cell { padding: 0; position: relative; background: #131824; vertical-align: top; overflow: hidden; }
.sheet td.cell .cell-stack { display: flex; flex-direction: column; }
.sheet td.cell .cell-input-row { display: flex; align-items: center; }
.sheet td.cell .cell-label { font-size: 11px; padding-left: 3px; width: 16px; flex-shrink: 0; text-align: center; font-weight: 700; }
.sheet td.cell .cell-label.before { color: #60a5fa; }
.sheet td.cell .cell-label.after { color: #f59e0b; }
.sheet td.cell .cell-input-row.before-row { background: #0c1018; }
.sheet td.cell .cell-input-row.after-row { background: #141e2c; }
.sheet td.cell input {
  flex: 1; border: none; outline: none;
  background: transparent; color: #D7D8DD; text-align: right;
  padding: 3px 4px; font-size: 13px; font-family: 'MaplestoryOTFLight', 'Consolas', monospace;
  height: 26px; min-width: 0;
}
.sheet td.cell input:focus { background: #25262b; }
.sheet td.cell input::selection { background: #1971c2; }
.sheet td.cell input::placeholder { color: #5c5f66; font-size: 11px; }
.sheet td.cell .cell-divider { height: 1px; background: #373A40; }
.sheet td.cell .cell-earned { text-align: right; padding: 2px 4px; font-size: 12px; font-family: 'MaplestoryOTFBold', 'Consolas', monospace; color: #1971c2; font-weight: 700; background: #0f1520; border-top: 1px solid #373A40; height: 22px; line-height: 22px; }
.sheet tr.sum-row td { background: #1B2030; color: #1971c2; font-weight: 700; text-align: right; padding: 6px 4px; font-size: 13px; font-family: 'MaplestoryOTFBold', 'Consolas', monospace; border-top: 2px solid #373A40; }
.sheet tr.sum-row td.row-header { color: #1971c2; border-top: 2px solid #373A40; }
.sheet tr.add-row td { background: transparent; border: none; overflow: visible; }
.sheet td.add-cell { padding: 0; border: none; overflow: visible; }
.sheet td.add-cell input {
  width: 100%; border: none; outline: none; background: transparent;
  color: #8F96A3; padding: 8px; font-size: 13px; height: 34px; font-family: inherit;
}
.sheet td.add-cell input::placeholder { color: #5c5f66; }
.sheet td.add-cell input:focus { color: #C1C2C5; }

/* Settled */
.sheet tr.settled-row td { background: #0f1520; }
.sheet tr.settled-row td.cell { background: #0f1520; }
.sheet tr.settled-row td.cell input { color: #3a4a60; }
.sheet tr.settled-row .cell-earned { color: #3a4a60; background: #0d1218; }
.sheet tr.settled-row .cell-label { color: #2a3a50; }
.sheet tr.settled-row .cell-divider { background: #1a2530; }
.sheet tr.settled-row td.row-header { position: relative; }
.settled-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 3; background: rgba(10,16,25,0.6); }
.settled-overlay span { background: #1971c2; color: #fff; font-size: 14px; font-weight: 800; padding: 5px 24px; letter-spacing: 4px; border-radius: 4px; white-space: nowrap; }

/* View tabs */
.view-tabs { display: flex; gap: 0; }
.view-tab { padding: 6px 16px; border: 1px solid #373A40; background: #131822; color: #8F96A3; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
.view-tab:first-child { border-radius: 4px 0 0 4px; }
.view-tab:last-child { border-radius: 0 4px 4px 0; }
.view-tab:not(:first-child) { border-left: none; }
.view-tab.active { background: #1971c2; color: #fff; border-color: #1971c2; font-weight: 700; }

.no-data { color: #7a7f8a; text-align: center; padding: 24px; font-size: 14px; }

/* History */
.history-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.history-controls label { color: #8F96A3; }
.history-controls input, .history-controls select { padding: 7px 12px; border-radius: 4px; border: 1px solid #373A40; background: #25262b; color: #C1C2C5; font-size: 14px; font-family: inherit; }
.history-controls input:focus, .history-controls select:focus { border-color: #1971c2; outline: none; }
.view-btn { padding: 5px 14px; border: none; border-radius: 4px; background: #1971c2; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
.view-btn:hover { background: #1864ab; }

/* Settings */
.setting-section { margin-bottom: 24px; }
.setting-section h3 { color: #FFFFFF; margin-bottom: 12px; font-size: 1.1em; }
.item-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.item-row { display: flex; align-items: center; gap: 8px; background: #131822; padding: 10px 14px; border-radius: 4px; border: 1px solid #373A40; }
.item-row span { flex: 1; color: #D7D8DD; cursor: pointer; border-bottom: 1px dashed #373A40; }
.item-row span:hover { color: #1971c2; border-color: #1971c2; }
.rename-input { flex: 1; padding: 4px 8px; border: 2px solid #1971c2; border-radius: 4px; font-size: 14px; outline: none; background: #25262b; color: #fff; font-family: inherit; }
.item-row button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: inherit; }
.btn-del { background: #c0392b; color: #fff; }
.btn-del:hover { background: #e74c3c; }
.btn-move { background: #1B2030; color: #9DA0AC; border: 1px solid #373A40; }
.btn-move:hover { background: #373A40; color: #fff; }
.btn-move:disabled { opacity: 0.35; cursor: not-allowed; }
.add-row { display: flex; gap: 8px; }
.add-row input { flex: 1; padding: 8px 12px; border-radius: 4px; border: 1px solid #373A40; background: #25262b; color: #C1C2C5; font-size: 14px; font-family: inherit; }
.add-row input:focus { border-color: #1971c2; outline: none; }
.btn-add { padding: 8px 18px; border: none; border-radius: 4px; background: #1971c2; color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }
.btn-add:hover { background: #1864ab; }

.data-section { display: flex; gap: 10px; flex-wrap: wrap; }
.data-section button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; }
.btn-export { background: #1971c2; color: #fff; }
.btn-import { background: #7048e8; color: #fff; }
.btn-reset { background: #c0392b; color: #fff; }
.btn-export:hover { background: #1864ab; }
.btn-import:hover { background: #5f3dc4; }
.btn-reset:hover { background: #e74c3c; }
input[type="file"] { display: none; }

/* Dashboard */
.dashboard { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.dash-card { flex: 1; min-width: 120px; background: #131822; border: 1px solid #373A40; border-radius: 4px; padding: 12px 16px; text-align: center; }
.dash-card .dash-label { font-size: 12px; color: #9DA0AC; margin-bottom: 4px; }
.dash-card .dash-value { font-size: 18px; font-weight: 700; font-family: 'MaplestoryOTFBold', 'Consolas', monospace; }
.dash-card .dash-value.income { color: #ef4444; }
.dash-card .dash-value.expense { color: #60a5fa; }
.dash-card .dash-value.net { color: #1971c2; }
.dash-card .dash-value.asset { color: #ef4444; }
.dash-card .dash-sub { font-size: 12px; color: #7a7f8a; margin-top: 3px; }

/* Ledger */
.ledger-form { margin-bottom: 12px; }
.ledger-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.ledger-row input, .ledger-row select { padding: 7px 10px; border-radius: 4px; border: 1px solid #373A40; background: #25262b; color: #C1C2C5; font-size: 13px; font-family: inherit; }
.ledger-row input:focus, .ledger-row select:focus { border-color: #1971c2; outline: none; }
.ledger-row select { min-width: 80px; }
.type-btns { display: flex; gap: 0; }
.type-btn { border: 1px solid #373A40; padding: 3px 8px; font-size: 11px; cursor: pointer; color: #5c5f66; background: #131822; font-family: inherit; transition: all 0.1s; }
.type-btn:first-child { border-radius: 4px 0 0 4px; }
.type-btn:last-child { border-radius: 0 4px 4px 0; border-left: none; }
.type-btn.active[data-val="income"] { background: #ef4444; color: #fff; border-color: #ef4444; }
.type-btn.active[data-val="expense"] { background: #60a5fa; color: #fff; border-color: #60a5fa; }
#ledgerCatBtns .type-btn { padding: 3px 6px; font-size: 11px; border-left: none; }
#ledgerCatBtns .type-btn:first-child { border-left: 1px solid #373A40; }
#ledgerCatBtns .type-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

/* Asset Calendar */
.asset-cal { background: #131822; border: 1px solid #373A40; border-radius: 4px; padding: 16px; margin-bottom: 12px; }
.asset-cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.asset-cal-nav { background: none; border: 1px solid #373A40; border-radius: 4px; color: #8F96A3; cursor: pointer; padding: 6px 14px; font-size: 13px; font-family: inherit; transition: all 0.15s; }
.asset-cal-nav:hover { background: #1971c2; color: #fff; border-color: #1971c2; }
.asset-cal-title { font-size: 1.15em; font-weight: 700; color: #FFFFFF; }
.asset-cal-today { background: #1971c2; color: #fff; border: none; border-radius: 4px; padding: 6px 16px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
.asset-cal-today:hover { background: #1864ab; }
.asset-cal-summary { margin-bottom: 14px; }
.asset-cal-week-summary { display: flex; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid #17191C; font-size: 13px; }
.asset-cal-month-summary { display: flex; justify-content: space-between; padding: 8px 10px; font-weight: 700; font-size: 14px; border-top: 1px solid #373A40; margin-top: 4px; }
.asset-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.asset-cal-dow { text-align: center; padding: 6px 0; font-size: 12px; color: #5c5f66; font-weight: 600; }
.asset-cal-dow.sun { color: #ff6b6b; }
.asset-cal-dow.sat { color: #60a5fa; }
.asset-cal-cell { background: #131822; border: 1px solid #373A40; border-radius: 4px; padding: 4px; min-height: 68px; cursor: pointer; transition: all 0.1s; }
.asset-cal-cell:hover { border-color: #1971c2; }
.asset-cal-cell.today { border-color: #1971c2; background: #0f1a2e; }
.asset-cal-cell.selected { background: #0d1a30; border-color: #1971c2; box-shadow: 0 0 0 1px #1971c2; }
.asset-cal-cell.other-month { opacity: 0.35; }
.asset-cal-cell .cal-date { font-size: 12px; font-weight: 700; color: #C1C2C5; margin-bottom: 2px; }
.asset-cal-cell .cal-date.sun { color: #ff6b6b; }
.asset-cal-cell .cal-date.sat { color: #60a5fa; }
.asset-cal-cell .cal-meso { font-size: 11px; color: #ef4444; line-height: 1.4; font-family: 'MaplestoryOTFLight', sans-serif; }
.asset-cal-cell .cal-meso.negative { color: #60a5fa; }
.asset-cal-cell .cal-dajo { font-size: 11px; color: #c4a5ff; line-height: 1.4; font-family: 'MaplestoryOTFLight', sans-serif; }
.asset-cal-cell .cal-ledger-income { font-size: 10px; color: #34d399; line-height: 1.3; font-family: 'MaplestoryOTFLight', sans-serif; }
.asset-cal-cell .cal-ledger-expense { font-size: 10px; color: #fb923c; line-height: 1.3; font-family: 'MaplestoryOTFLight', sans-serif; }
.asset-cal-cell .cal-balance { font-size: 10px; color: #34d399; line-height: 1.3; font-family: 'MaplestoryOTFLight', sans-serif; }
.asset-cal-cell .cal-balance.negative { color: #fb923c; }
.asset-cal-cell-empty { min-height: 68px; }

/* Inline ledger in journal tab */
.journal-ledger { margin-top: 16px; background: #131822; border: 1px solid #373A40; border-radius: 4px; padding: 14px; }
.journal-ledger h4 { color: #FFFFFF; margin-bottom: 10px; font-size: 14px; }

.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 4px; color: #fff; font-size: 0.9em; opacity: 0; transition: opacity 0.3s; z-index: 100; font-family: inherit; }
.toast.show { opacity: 1; }
.toast.success { background: #1971c2; }
.toast.error { background: #c0392b; }
</style>
</head>
<body>
<div class="app">
  <div class="header-bar">
    <h1 style="font-family:'MaplestoryOTFBold',sans-serif;">메이플 일일 재화 관리</h1>
    <div class="cloud-bar">
      <button id="cloudSaveBtn" class="cloud-btn" onclick="manualCloudSave()">저장됨</button>
      <button id="cloudLoadBtn" class="cloud-btn cloud-btn-load" onclick="manualCloudLoad()">불러오기</button>
    </div>
  </div>
  <div class="user-tabs" id="userTabs"></div>
  <div class="dashboard" id="dashboard"></div>
  <div class="tabs">
    <button class="tab active" data-tab="journal">일지</button>
    <button class="tab" data-tab="history">부주 정산</button>
    <button class="tab" data-tab="settings">설정</button>
  </div>

  <!-- 일지 (캘린더 + 입력 + 가계부) -->
  <div id="journal" class="panel active">
    <input type="date" id="inputDate" style="display:none">
    <div id="assetCalendarWrap"></div>
    <div id="inputTableSection" style="margin-top:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:4px 0;">
        <span style="color:#ef4444;font-weight:700;font-size:14px;">📋 재획 기록</span>
        <span style="color:#5c5f66;font-size:11px;">캐릭터별 시작 전/후 재화 수급</span>
      </div>
      <div class="sheet-wrap" id="inputTableWrap"></div>
    </div>
    <div id="balanceSection" style="margin-top:16px;padding:12px;background:#0f1320;border:1px solid #1f2937;border-radius:6px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="color:#34d399;font-weight:700;font-size:14px;">📊 잔고 기록</span>
        <span style="color:#5c5f66;font-size:11px;">끄기 전 총 잔고만 입력 → 전일 대비 자동 산출</span>
      </div>
      <div id="balanceContent"></div>
    </div>
    <div class="journal-ledger" id="journalLedgerWrap" style="margin-top:16px;padding:12px;background:#0f1320;border:1px solid #1f2937;border-radius:6px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="color:#60a5fa;font-weight:700;font-size:14px;">💰 보스/기타 수입지출</span>
        <span style="color:#5c5f66;font-size:11px;">보스 결정석, 장비 매매, 강화 등</span>
      </div>
      <div class="ledger-form" style="display:flex;flex-direction:column;gap:8px;">
        <div class="type-btns" id="ledgerCatBtns">
          <button type="button" class="type-btn active" data-val="보스" onclick="setLedgerCat('보스')">🗡️보스</button>
          <button type="button" class="type-btn" data-val="장비" onclick="setLedgerCat('장비')">⚔️장비</button>
          <button type="button" class="type-btn" data-val="강화" onclick="setLedgerCat('강화')">💎강화</button>
          <button type="button" class="type-btn" data-val="거래" onclick="setLedgerCat('거래')">🔄거래</button>
          <button type="button" class="type-btn" data-val="기타" onclick="setLedgerCat('기타')">📌기타</button>
        </div>
        <input type="hidden" id="ledgerCategory" value="보스">
        <div style="display:flex;gap:8px;align-items:stretch;">
          <div style="flex:1;background:#131822;border:1px solid #373A40;border-radius:6px;padding:8px;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
              <img src="meso.png" style="width:16px;height:16px">
              <span style="color:#8F96A3;font-size:11px;font-weight:600;">메소</span>
              <div class="type-btns" id="mesoTypeBtns">
                <button type="button" class="type-btn active" data-val="income" onclick="setLedgerType('meso','income')" style="padding:2px 8px;font-size:10px;">수입</button>
                <button type="button" class="type-btn" data-val="expense" onclick="setLedgerType('meso','expense')" style="padding:2px 8px;font-size:10px;">지출</button>
              </div>
            </div>
            <input type="text" id="ledgerMesoAmt" placeholder="억 단위 (예: 5.43 = 5.43억)" style="width:100%;padding:6px 8px;background:#1B2030;border:1px solid #373A40;border-radius:4px;color:#C1C2C5;font-family:inherit;font-size:13px;text-align:right;">
          </div>
          <div style="flex:1;background:#131822;border:1px solid #373A40;border-radius:6px;padding:8px;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
              <img src="dajo.png" style="width:16px;height:16px">
              <span style="color:#8F96A3;font-size:11px;font-weight:600;">다조</span>
              <div class="type-btns" id="dajoTypeBtns">
                <button type="button" class="type-btn active" data-val="income" onclick="setLedgerType('dajo','income')" style="padding:2px 8px;font-size:10px;">수입</button>
                <button type="button" class="type-btn" data-val="expense" onclick="setLedgerType('dajo','expense')" style="padding:2px 8px;font-size:10px;">지출</button>
              </div>

const DEFAULT_RESOURCES = ['매소', '다조', '경험치', '기운', '상주정', '우유', '이슬', '코젬', '달라심볼'];

// --- Supabase 저장/로드 ---
async function cloudSave() {
  if (_saving) { _saveQueued = true; return; }
  if (!_cloudData) return;
  _saving = true;
  try {
    const username = getCurrentUser();
    // 1. 최신 데이터를 Supabase에서 불러오기 (다른 유저 변경사항 보존)
    let latest = null;
    try {
      const { data, error } = await _supabase
        .from('maple_state')
        .select('data')
        .eq('id', STATE_ROW_ID)
        .single();
      if (!error && data) latest = data.data;
    } catch (e) { console.warn('최신 데이터 로드 실패, 전체 덮어쓰기:', e); }

    // 2. 병합: 로컬 기반 + 원격 다른 유저 프로필 갱신
    let merged = _cloudData;
    if (latest && latest.profiles) {
      merged.users.forEach(u => {
        if (u !== username && latest.profiles[u]) {
          merged.profiles[u] = latest.profiles[u];
        }
      });
    }

    localStorage.setItem('maple_cloud_cache', JSON.stringify(merged));
    const { error: upsertError } = await _supabase
      .from('maple_state')
      .upsert({ id: STATE_ROW_ID, data: merged }, { onConflict: 'id' });
    if (upsertError) console.error('Supabase 저장 실패:', upsertError);
  } catch (e) {
    console.error('Supabase 저장 실패:', e);
  }
  _saving = false;
  if (_saveQueued) { _saveQueued = false; cloudSave(); }
}

// 자동 저장 디바운스 (5초)
let _autoSaveTimer = null;
function scheduleAutoSave() {
  markUnsaved();
  if (_autoSaveTimer) clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(() => {
    _autoSaveTimer = null;
    manualCloudSave();
  }, 5000);
}

// 자동 폴링 (30초) - 다른 유저 데이터 갱신
let _pollTimer = null;
function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(async () => {
    if (_saving || _autoSaveTimer) return; // 저장 중이거나 수정 중이면 스킵
    try {
      const cloud = await cloudLoad();
      if (!cloud || !cloud.profiles) return;
      const myUser = getCurrentUser();
      let updated = false;
      // 다른 유저 프로필만 갱신
      Object.keys(cloud.profiles).forEach(user => {
        if (user !== myUser) {
          const remote = JSON.stringify(cloud.profiles[user]);
          const local = JSON.stringify(_cloudData.profiles[user] || {});
          if (remote !== local) {
            _cloudData.profiles[user] = cloud.profiles[user];
            updated = true;
          }
        }
      });
      // 새 유저 추가된 경우
      cloud.users.forEach(u => {
        if (!_cloudData.users.includes(u)) {
          _cloudData.users.push(u);
          _cloudData.profiles[u] = cloud.profiles[u];
          updated = true;
        }
      });
      if (updated) {
        localStorage.setItem('maple_cloud_cache', JSON.stringify(_cloudData));
        renderUserSelect();
      }
    } catch (e) { /* 폴링 실패는 무시 */ }
  }, 30000);
}

async function cloudLoad() {
  try {
    const { data, error } = await _supabase
      .from('maple_state')
      .select('data')
      .eq('id', STATE_ROW_ID)
      .single();
    if (error) { console.error('Supabase 로드 실패:', error); return null; }
    return data?.data ?? null;
  } catch (e) {
    console.error('Supabase 로드 실패:', e);
    return null;
  }
}

async function initCloud() {
  const cached = localStorage.getItem('maple_cloud_cache');
  if (cached) _cloudData = JSON.parse(cached);

  const cloud = await cloudLoad();
  if (cloud && cloud.users) {
    // 서버 데이터에 최소 버전이 기록되어 있으면 체크
    if (cloud._minVersion && APP_VERSION < cloud._minVersion) {
      alert('앱이 업데이트되었습니다. 페이지를 새로고침합니다.');
      location.reload(true);
      return;
    }
    _cloudData = cloud;
    _cloudData._minVersion = APP_VERSION;
    localStorage.setItem('maple_cloud_cache', JSON.stringify(_cloudData));
  }

  if (!_cloudData || !_cloudData.users) {
    _cloudData = getEmptyCloud();
    const usersRaw = localStorage.getItem('maple_tracker_users');
    const oldData = localStorage.getItem('maple_daily_tracker');
    if (usersRaw) {
      const users = JSON.parse(usersRaw);
      _cloudData.users = users.list || ['기본'];
      _cloudData.profiles = {};
      _cloudData.users.forEach(name => {
        const raw = localStorage.getItem('maple_tracker_' + name);
        _cloudData.profiles[name] = raw ? JSON.parse(raw) : { characters: [], resources: [...DEFAULT_RESOURCES], records: {}, settlements: {} };
      });
      if (users.current) setCurrentUser(users.current);
    } else if (oldData) {
      _cloudData.profiles['기본'] = JSON.parse(oldData);
    }
    await cloudSave();
  }

  if (!_cloudData.users.includes(getCurrentUser())) {
    setCurrentUser(_cloudData.users[0] || '기본');
  }

  renderUserSelect();
  refreshAll();
  startPolling();
}

function deleteUserTab(name) {

function loadData() {
  const username = getCurrentUser();
  const profile = _cloudData?.profiles?.[username];
  if (profile) return profile;
  return { characters: [], resources: [...DEFAULT_RESOURCES], records: {}, settlements: {} };
}

function cleanEmptyRecords(data) {
  if (!data.records) return;
  Object.keys(data.records).forEach(date => {
    const day = data.records[date];
    if (!day || typeof day !== 'object') { delete data.records[date]; return; }
    Object.keys(day).forEach(ch => {
      const charRec = day[ch];
      if (!charRec || typeof charRec !== 'object') { delete day[ch]; return; }
      Object.keys(charRec).forEach(r => {
        const v = charRec[r];
        if (!v || typeof v !== 'object') { delete charRec[r]; return; }
        const vals = Object.values(v);
        if (vals.every(x => x === '' || x === undefined || x === null)) delete charRec[r];
      });
      if (!Object.keys(charRec).length) delete day[ch];
    });
    if (!Object.keys(day).length) delete data.records[date];
  });
}

function saveData(data) {
  cleanEmptyRecords(data);
  const username = getCurrentUser();
  if (!_cloudData) _cloudData = getEmptyCloud();
  _cloudData.profiles[username] = data;
  localStorage.setItem('maple_cloud_cache', JSON.stringify(_cloudData));
  scheduleAutoSave();
}

function todayStr() {

}

function formatNum(n) {
  if (n === 0 || n === '' || n === null || n === undefined) return '';
  const v = Number(n);
  // 소수점이 있거나 1만 미만이면 소수점 둘째자리까지
  if (!Number.isInteger(v) || (Math.abs(v) < 10000 && v % 1 !== 0)) {
    const r = Math.round(v * 100) / 100;
    return r % 1 === 0 ? String(r) : r.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
  }
  return formatMeso(v);
}

function formatMeso(n) {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  const eok = Math.floor(abs / 100000000);
  const man = Math.floor((abs % 100000000) / 10000);
  const rest = abs % 10000;
  let parts = [];
  if (eok) parts.push(eok + '억');
  if (man) parts.push(man + '만');
  if (rest) parts.push(String(rest));
  return sign + (parts.length ? parts.join(' ') : '0');
}

function formatMesoShort(n) {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 100000000) return sign + (abs / 100000000).toFixed(1).replace(/\.0$/, '') + '억';
  if (abs >= 10000) return sign + Math.round(abs / 10000) + '만';
  return sign + abs;
}

// 최근 데이터 역추적 (최대 7일, after → before 순)
function findPrevValue(records, ch, res, fromDate, maxDays) {
  const d = new Date(fromDate + 'T00:00:00');
  for (let i = 1; i <= (maxDays || 7); i++) {
    d.setDate(d.getDate() - 1);
    const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const rec = records?.[ds]?.[ch]?.[res];
    if (!rec) continue;
    if (res === '경험치') {
      if (typeof rec === 'object') {
        if (rec.afterLv !== '' && rec.afterLv !== undefined) return { val: rec, src: 'after' };
        if (rec.beforeLv !== '' && rec.beforeLv !== undefined) return { val: rec, src: 'before' };
      }
    } else {
      const r = typeof rec === 'number' ? { before: 0, after: rec } : rec;
      if (r.after !== '' && r.after !== undefined) return { val: r.after, src: 'after' };
      if (r.before !== '' && r.before !== undefined) return { val: r.before, src: 'before' };
    }
  }
  return null;
}

  const cleaned = el.value.replace(/[^0-9.\-]/g, '');

}

  const data = loadData();
  const year = _acYear;
  const month = _acMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();
  const today = todayStr();
  const selected = _selectedDate;

  // daily meso, dajo, ledger aggregates
  const dailyMeso = {}, dailyDajo = {}, dailyLedgerIncome = {}, dailyLedgerExpense = {};
  Object.keys(data.records || {}).forEach(date => {
    const [y,m] = date.split('-').map(Number);
    if (y === year && m === month + 1) {
      let meso = 0, dajo = 0;
      (data.characters || []).forEach(ch => {
        const mesoRec = data.records[date]?.[ch]?.['매소'];
        if (mesoRec) meso += getEarned(mesoRec);
        const dajoRec = data.records[date]?.[ch]?.['다조'];
        if (dajoRec) dajo += getEarned(dajoRec);
      });
      if (meso) dailyMeso[date] = meso;
      if (dajo) dailyDajo[date] = dajo;
    }
  });

  // ledger aggregates for this month
  (data.ledger || []).forEach(entry => {
    const [y,m] = entry.date.split('-').map(Number);
    if (y === year && m === month + 1) {
      if (entry.type === 'income') {
        dailyLedgerIncome[entry.date] = (dailyLedgerIncome[entry.date] || 0) + (Number(entry.amount) || 0);
      } else {
        dailyLedgerExpense[entry.date] = (dailyLedgerExpense[entry.date] || 0) + (Number(entry.amount) || 0);
      }
    }
  });

  // Balance deltas for this month
  const dailyBalMeso = {}, dailyBalDajo = {};
  const balLog = data.balanceLog || {};
  const balDates = Object.keys(balLog).sort();
  balDates.forEach((bd, idx) => {
    if (idx > 0) {
      const [by, bm] = bd.split('-').map(Number);
      if (by === year && bm === month + 1) {
        const prevBd = balDates[idx - 1];
        dailyBalMeso[bd] = (balLog[bd].meso || 0) - (balLog[prevBd].meso || 0);
        dailyBalDajo[bd] = (balLog[bd].dajo || 0) - (balLog[prevBd].dajo || 0);
      }
    }
  });

  // Week summaries (Thu-Wed)
  const weeks = {};
  for (let d = 1; d <= lastDate; d++) {
    const dt = new Date(year, month, d);
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = dt.getDay();
    const thuOffset = (dow - 4 + 7) % 7;
    const thuDate = new Date(dt);
    thuDate.setDate(dt.getDate() - thuOffset);
    const thuMonth = thuDate.getMonth();
    if (thuMonth === month || (d <= 7 && thuMonth === month - 1)) {
      const firstThu = new Date(year, month, 1);
      while (firstThu.getDay() !== 4) firstThu.setDate(firstThu.getDate() + 1);
      let wk;
      if (thuMonth !== month) {
        // 월 첫째 목요일 이전 날짜는 1주차에 포함
        wk = 1;
      } else {
        const weekNum = Math.floor((thuDate.getDate() - firstThu.getDate()) / 7) + 1;
        wk = Math.max(1, weekNum);
      }
      if (!weeks[wk]) weeks[wk] = { meso: 0, dajo: 0 };
      weeks[wk].meso += dailyMeso[ds] || 0;
      weeks[wk].dajo += dailyDajo[ds] || 0;
    }
  }

  let monthMeso = 0, monthDajo = 0;
  Object.values(dailyMeso).forEach(v => monthMeso += v);
  Object.values(dailyDajo).forEach(v => monthDajo += v);

  // Build HTML
  let html = '<div class="asset-cal">';

  // Header
  html += '<div class="asset-cal-header">';
  html += `<button class="asset-cal-nav" onclick="acMove(-1)">&lsaquo; 이전 달</button>`;
  html += `<span class="asset-cal-title">${year}년 ${month+1}월</span>`;
  html += `<div style="display:flex;gap:6px;">`;
  html += `<button class="asset-cal-today" onclick="acToday()">오늘</button>`;
  html += `<button class="asset-cal-nav" onclick="acMove(1)">다음 달 &rsaquo;</button>`;
  html += `</div></div>`;

  // Week summaries
  html += '<div class="asset-cal-summary">';
  Object.keys(weeks).sort().forEach(wk => {
    const w = weeks[wk];
    const mesoColor = w.meso > 0 ? '#ef4444' : w.meso < 0 ? '#60a5fa' : '#5c5f66';
    html += `<div class="asset-cal-week-summary">`;
    html += `<span style="color:#8F96A3;">${wk}주차 (목~수)</span>`;
    const dp = getDajoPrice();
    const wTotal = w.meso + w.dajo * dp;
    const wTotalColor = wTotal > 0 ? '#ef4444' : wTotal < 0 ? '#60a5fa' : '#5c5f66';
    html += `<span>`;
    html += `<span style="color:${wTotalColor};font-weight:600;">${wTotal >= 0 ? '+' : ''}${formatMeso(wTotal)}</span>`;
    if (w.dajo) html += `<span style="color:#a78bfa;margin-left:6px;font-size:11px;">(메소 ${formatMesoShort(w.meso)} + 다조 ${w.dajo}개)</span>`;
    html += `</span></div>`;
  });
  const dp = getDajoPrice();
  const monthTotal = monthMeso + monthDajo * dp;
  const mMonthColor = monthTotal > 0 ? '#ef4444' : monthTotal < 0 ? '#60a5fa' : '#5c5f66';
  html += `<div class="asset-cal-month-summary">`;
  html += `<span style="color:#C1C2C5;">${month+1}월 합계</span>`;
  html += `<span>`;
  html += `<span style="color:${mMonthColor};">${monthTotal >= 0 ? '+' : ''}${formatMeso(monthTotal)}</span>`;
  if (monthDajo) html += `<span style="color:#a78bfa;margin-left:6px;font-size:11px;">(메소 ${formatMesoShort(monthMeso)} + 다조 ${monthDajo}개)</span>`;
  html += `</span></div>`;
  html += '</div>';

  // Day-of-week headers
  const dows = ['일','월','화','수','목','금','토'];
  html += '<div class="asset-cal-grid">';
  dows.forEach((d,i) => {
    let cls = 'asset-cal-dow';
    if (i === 0) cls += ' sun';
    if (i === 6) cls += ' sat';
    html += `<div class="${cls}">${d}</div>`;
  });

  // Previous month fill
  const prevLastDate = new Date(year, month, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    const dd = prevLastDate - i;
    const pm = month === 0 ? 12 : month;
    const py = month === 0 ? year - 1 : year;
    const ds = `${py}-${String(pm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const dow = (firstDay - 1 - i) % 7;
    let dateCls = 'cal-date';
    if (dow === 0) dateCls += ' sun';
    if (dow === 6) dateCls += ' sat';
    html += `<div class="asset-cal-cell other-month" onclick="selectDate('${ds}')">`;
    html += `<div class="${dateCls}">${dd}</div>`;
    html += `</div>`;
  }

  // Current month days
  for (let d = 1; d <= lastDate; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year, month, d).getDay();
    let cellCls = 'asset-cal-cell';
    if (ds === today) cellCls += ' today';
    if (ds === selected) cellCls += ' selected';
    let dateCls = 'cal-date';
    if (dow === 0) dateCls += ' sun';
    if (dow === 6) dateCls += ' sat';

    const meso = dailyMeso[ds] || 0;
    const dajo = dailyDajo[ds] || 0;
    const lIncome = dailyLedgerIncome[ds] || 0;
    const lExpense = dailyLedgerExpense[ds] || 0;
    const balM = dailyBalMeso[ds] || 0;
    const balD = dailyBalDajo[ds] || 0;

    html += `<div class="${cellCls}" onclick="selectDate('${ds}')">`;
    html += `<div class="${dateCls}">${d}</div>`;
    if (meso) {
      const mc = meso > 0 ? 'cal-meso' : 'cal-meso negative';
      html += `<div class="${mc}">${meso > 0 ? '+' : ''}${formatMesoShort(meso)}</div>`;
    }
    if (dajo) {
      html += `<div class="cal-dajo">${dajo > 0 ? '+' : ''}${dajo}개</div>`;
    }
    if (lIncome) {
      html += `<div class="cal-ledger-income">💰+${formatMesoShort(lIncome)}</div>`;
    }
    if (lExpense) {
      html += `<div class="cal-ledger-expense">💰-${formatMesoShort(lExpense)}</div>`;
    }
    if (balM || balD) {
      const bc = balM >= 0 ? 'cal-balance' : 'cal-balance negative';
      let balText = '📊';
      if (balM) balText += `${balM > 0 ? '+' : ''}${formatMesoShort(balM)}`;
      if (balD) balText += ` ${balD > 0 ? '+' : ''}${balD}개`;
      html += `<div class="${bc}">${balText}</div>`;
    }
    html += `</div>`;
  }

  // Next month fill
  const totalCells = firstDay + lastDate;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const nm = month === 11 ? 1 : month + 2;
    const ny = month === 11 ? year + 1 : year;
    const ds = `${ny}-${String(nm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = (totalCells + d - 1) % 7;
    let dateCls = 'cal-date';
    if (dow === 0) dateCls += ' sun';
    if (dow === 6) dateCls += ' sat';
    html += `<div class="asset-cal-cell other-month" onclick="selectDate('${ds}')">`;
    html += `<div class="${dateCls}">${d}</div>`;
    html += `</div>`;
  }

  html += '</div>'; // grid
  html += '</div>'; // asset-cal
  wrap.innerHTML = html;
}

// 경험치 획득량 (레벨+% 방식)
function getExpEarned(rec) {
  if (typeof rec !== 'object' || rec === null) return '';
  const bLv = rec.beforeLv, bPct = rec.beforePct, aLv = rec.afterLv, aPct = rec.afterPct;
  if (bLv === '' || bLv === undefined || bPct === '' || bPct === undefined ||
      aLv === '' || aLv === undefined || aPct === '' || aPct === undefined) return '';
  const lvDiff = Number(aLv) - Number(bLv);
  const pctDiff = ((Number(aPct) || 0) - (Number(bPct) || 0)).toFixed(3);
  const totalPct = (lvDiff * 100 + Number(pctDiff)).toFixed(3);
  if (lvDiff > 0) return `${lvDiff}Lv +${(Number(aPct)||0).toFixed(3)}% (${totalPct}%)`;
  if (lvDiff === 0) return `+${pctDiff}%`;
  return `${totalPct}%`;
}

// 경험치 획득량 숫자값 (정산용)
function getExpEarnedNum(rec) {
  if (typeof rec !== 'object' || rec === null) return 0;
  const bLv = rec.beforeLv, bPct = rec.beforePct, aLv = rec.afterLv, aPct = rec.afterPct;
  if (bLv === '' || bLv === undefined || bPct === '' || bPct === undefined ||
      aLv === '' || aLv === undefined || aPct === '' || aPct === undefined) return 0;
  return (Number(aLv) - Number(bLv)) * 100 + (Number(aPct) || 0) - (Number(bPct) || 0);
}

// 레코드에서 획득량 계산 (after - before)
function getEarned(rec) {
  if (typeof rec === 'number') return rec;
  if (typeof rec === 'object' && rec !== null) {
    if (rec.before !== '' && rec.before !== undefined && rec.after !== '' && rec.after !== undefined) {
      return (Number(rec.after) || 0) - (Number(rec.before) || 0);
    }
  }
  return 0;
}

function renderInputTable() {
  const data = loadData();
  const wrap = document.getElementById('inputTableWrap');
  const date = dateInput.value;

  if (!data.resources.length) {
    wrap.innerHTML = '<div class="no-data">설정 탭에서 재화 항목을 먼저 추가해주세요.</div>';
    return;
  }

  let html = `<div style="margin-bottom:8px;color:#8F96A3;font-size:13px;">선택된 날짜: <strong style="color:#FFFFFF">${date}</strong></div>`;
  const resIcons = { '매소': 'meso.png', '다조': 'dajo.png' };
  html += '<table class="sheet"><thead><tr><th class="corner"></th>';
  data.resources.forEach(r => {
    const icon = resIcons[r] ? `<img src="${resIcons[r]}" style="width:18px;height:18px;vertical-align:middle;margin-right:3px;">` : '';
    html += `<th>${icon}${r}</th>`;
  });
  html += '</tr></thead><tbody>';

  data.characters.forEach(ch => {
    const settledDate = data.settlements?.[ch]?.lastDate || '';
    const isSettled = settledDate && date <= settledDate;

    // findPrevValue는 전역 함수로 이동됨

    html += `<tr${isSettled ? ' class="settled-row"' : ''}><td class="row-header" style="position:relative;cursor:pointer" data-charname="${ch}" ondblclick="renameCharInline(this)">${ch}${isSettled ? '<div class="settled-overlay"><span>정 산 완 료</span></div>' : ''}</td>`;
    data.resources.forEach(r => {
      let rec = data.records?.[date]?.[ch]?.[r];
      const ro = isSettled ? ' readonly' : '';
      html += `<td class="cell"><div class="cell-stack">`;

      if (r === '경험치') {
        if (typeof rec !== 'object' || rec === null) rec = {};
        let bLv = rec.beforeLv ?? '';
        let bPct = rec.beforePct ?? '';
        let expAuto = false;
        // 자동 복사: 시작 전 비어있으면 최근 데이터에서 가져옴
        if (bLv === '' && bPct === '') {
          const prev = findPrevValue(data.records, ch, r, date);
          if (prev) {
            const p = prev.val;
            if (prev.src === 'after' && p.afterLv !== '' && p.afterLv !== undefined) {
              bLv = p.afterLv; bPct = p.afterPct ?? ''; expAuto = true;
            } else if (prev.src === 'before' && p.beforeLv !== '' && p.beforeLv !== undefined) {
              bLv = p.beforeLv; bPct = p.beforePct ?? ''; expAuto = true;
            }
          }
        }
        const aLv = rec.afterLv ?? '';
        const aPct = rec.afterPct ?? '';
        const dispRec = { beforeLv: bLv, beforePct: bPct, afterLv: aLv, afterPct: aPct };
        const earned = getExpEarned(dispRec);
        const autoC = expAuto ? ';color:#4a6a8a' : '';
        html += `<div class="cell-input-row before-row"><span class="cell-label before">전</span><input type="text" value="${bLv}" data-date="${date}" data-char="${ch}" data-res="${r}" data-field="beforeLv" placeholder="Lv" style="width:36px;text-align:center${autoC}"${ro}><input type="text" value="${bPct}" data-date="${date}" data-char="${ch}" data-res="${r}" data-field="beforePct" placeholder="%" style="flex:1${autoC}"${ro}></div>`;
        html += `<div class="cell-divider"></div>`;
        html += `<div class="cell-input-row after-row"><span class="cell-label after">후</span><input type="text" value="${aLv}" data-date="${date}" data-char="${ch}" data-res="${r}" data-field="afterLv" placeholder="Lv" style="width:36px;text-align:center"${ro}><input type="text" value="${aPct}" data-date="${date}" data-char="${ch}" data-res="${r}" data-field="afterPct" placeholder="%" style="flex:1"${ro}></div>`;
        const expNum = getExpEarnedNum(dispRec);
        const expColor = expNum > 0 ? '#ef4444' : expNum < 0 ? '#60a5fa' : '';
        html += `<div class="cell-earned" data-earned-char="${ch}" data-earned-res="${r}" style="${expColor ? 'color:' + expColor : ''}">${earned}</div>`;
      } else {
        if (typeof rec === 'number') rec = { before: 0, after: rec };
        if (typeof rec !== 'object' || rec === null) rec = { before: '', after: '' };
        let bv = rec.before ?? '';
        let isAutoB = false;
        // 자동 복사: 시작 전 비어있으면 최근 데이터에서 가져옴 (after → before 순)
        if (bv === '') {
          const prev = findPrevValue(data.records, ch, r, date);
          if (prev) { bv = prev.val; isAutoB = true; }
        }
        const av = rec.after ?? '';
        const earned = (bv !== '' && av !== '') ? (Number(av) || 0) - (Number(bv) || 0) : '';
        const bvDisp = bv !== '' ? formatMeso(Number(bv)) : '';
        const avDisp = av !== '' ? formatMeso(Number(av)) : '';
        const earnedColor = earned > 0 ? '#ef4444' : earned < 0 ? '#60a5fa' : '';
        const autoS = isAutoB ? ' style="color:#4a6a8a"' : '';
        html += `<div class="cell-input-row before-row"><span class="cell-label before">전</span><input type="text" value="${bvDisp}" data-raw="${bv}" data-date="${date}" data-char="${ch}" data-res="${r}" data-field="before" placeholder="시작 전"${autoS}${ro}></div>`;
        html += `<div class="cell-divider"></div>`;
        html += `<div class="cell-input-row after-row"><span class="cell-label after">후</span><input type="text" value="${avDisp}" data-raw="${av}" data-date="${date}" data-char="${ch}" data-res="${r}" data-field="after" placeholder="종료 후"${ro}></div>`;
        html += `<div class="cell-earned" data-earned-char="${ch}" data-earned-res="${r}" style="${earnedColor ? 'color:' + earnedColor : ''}">${earned !== '' ? formatNum(earned) : ''}</div>`;
      }

      html += `</div></td>`;
    });
    html += '</tr>';
  });

  // 합계 행
  html += '<tr class="sum-row"><td class="row-header">합계</td>';
  data.resources.forEach(r => {
    let sum = 0;
    data.characters.forEach(ch => { sum += getEarned(data.records?.[date]?.[ch]?.[r]); });
    const sc = sum > 0 ? 'color:#ef4444' : sum < 0 ? 'color:#60a5fa' : '';
    html += `<td data-sum-res="${r}" style="${sc}">${formatNum(sum)}</td>`;
  });
  html += '</tr>';

  // 캐릭터 추가 행
  const totalCols = data.resources.length + 1;
  html += `<tr class="add-row"><td class="add-cell" colspan="${totalCols}">`;
  html += '<input type="text" id="inlineAddChar" placeholder="+ 캐릭터 추가 (이름 → Enter)">';
  html += '</td></tr>';

  html += '</tbody></table>';
  wrap.innerHTML = html;

  document.getElementById('inlineAddChar').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const name = this.value.trim();
      if (!name) return;
      const d = loadData();
      if (d.characters.includes(name)) { toast('이미 존재하는 캐릭터입니다.', 'error'); return; }
      d.characters.push(name);
      saveData(d);
      toast(`"${name}" 추가됨`);
      renderInputTable();
    }
  });
}

function updateValue(el) {
  const data = loadData();
  const { date, char: ch, res, field } = el.dataset;
  if (!data.records[date]) data.records[date] = {};
  if (!data.records[date][ch]) data.records[date][ch] = {};
  let rec = data.records[date][ch][res];
  const num = el.value.replace(/[^0-9.\-]/g, '');
  const val = num !== '' ? Number(num) : '';

  if (res === '경험치') {
    if (typeof rec !== 'object' || rec === null) rec = {};
    rec[field] = val;
    // 자동 복사: before 비어있고 after 입력 시 최근 데이터에서 가져옴
    if ((field === 'afterLv' || field === 'afterPct') && (rec.beforeLv === '' || rec.beforeLv === undefined)) {
      const prev = findPrevValue(data.records, ch, res, date);
      if (prev) {
        const p = prev.val;
        const srcLv = prev.src === 'after' ? p.afterLv : p.beforeLv;
        const srcPct = prev.src === 'after' ? p.afterPct : p.beforePct;
        if (srcLv !== '' && srcLv !== undefined) { rec.beforeLv = srcLv; rec.beforePct = srcPct ?? ''; }
      }
    }
    data.records[date][ch][res] = rec;
    const isEmpty = (rec.beforeLv === '' || rec.beforeLv === undefined) &&
                    (rec.beforePct === '' || rec.beforePct === undefined) &&
                    (rec.afterLv === '' || rec.afterLv === undefined) &&
                    (rec.afterPct === '' || rec.afterPct === undefined);
    if (isEmpty) delete data.records[date][ch][res];
  } else {
    if (typeof rec === 'number') rec = { before: 0, after: rec };
    if (typeof rec !== 'object' || rec === null) rec = { before: '', after: '' };
    rec[field] = val;
    // 자동 복사: before 비어있고 after 입력 시 최근 데이터에서 가져옴
    if (field === 'after' && (rec.before === '' || rec.before === undefined)) {
      const prev = findPrevValue(data.records, ch, res, date);
      if (prev) rec.before = prev.val;
    }
    data.records[date][ch][res] = rec;
    if (rec.before === '' && rec.after === '') delete data.records[date][ch][res];
  }

  if (data.records[date][ch] && !Object.keys(data.records[date][ch]).length) delete data.records[date][ch];
  if (data.records[date] && !Object.keys(data.records[date]).length) delete data.records[date];

  saveData(data);
}

function updateSums() {
  const data = loadData();
  const date = dateInput.value;

  document.querySelectorAll('.cell-earned[data-earned-char]').forEach(el => {
    const ch = el.dataset.earnedChar;
    const r = el.dataset.earnedRes;
    const rec = data.records?.[date]?.[ch]?.[r];
    if (r === '경험치') {
      el.textContent = getExpEarned(rec);
      const expVal = getExpEarnedNum(rec);
      el.style.color = expVal > 0 ? '#ef4444' : expVal < 0 ? '#60a5fa' : '';
    } else if (typeof rec === 'object' && rec !== null) {
      const bEmpty = rec.before === '' || rec.before === undefined;
      const aEmpty = rec.after === '' || rec.after === undefined;
      const val = (!bEmpty && !aEmpty) ? (Number(rec.after)||0) - (Number(rec.before)||0) : '';
      el.textContent = val !== '' ? formatNum(val) : '';
      el.style.color = val > 0 ? '#ef4444' : val < 0 ? '#60a5fa' : '';
    } else {
      el.textContent = '';
      el.style.color = '';
    }
  });

  data.resources.forEach(r => {
    const el = document.querySelector(`[data-sum-res="${r}"]`);
    if (!el) return;
    if (r === '경험치') {
      let totalPct = 0;
      data.characters.forEach(ch => { totalPct += getExpEarnedNum(data.records?.[date]?.[ch]?.[r]); });
      el.textContent = totalPct ? `+${totalPct.toFixed(3)}%` : '';
      el.style.color = totalPct > 0 ? '#ef4444' : totalPct < 0 ? '#60a5fa' : '';
    } else {
      let sum = 0;
      data.characters.forEach(ch => { sum += getEarned(data.records?.[date]?.[ch]?.[r]); });
      el.textContent = formatNum(sum);
      el.style.color = sum > 0 ? '#ef4444' : sum < 0 ? '#60a5fa' : '';
    }
  });
}

function renameCharInline(td) {
  const oldName = td.dataset.charname;
  const newName = prompt(`"${oldName}" → 새 이름:`, oldName);
  if (!newName || !newName.trim() || newName.trim() === oldName) return;
  const data = loadData();
  const idx = data.characters.indexOf(oldName);
  if (idx === -1) return;
  if (data.characters.includes(newName.trim())) { toast('이미 존재하는 이름입니다.', 'error'); return; }
  data.characters[idx] = newName.trim();
  Object.keys(data.records).forEach(date => {
    if (data.records[date][oldName]) {
      data.records[date][newName.trim()] = data.records[date][oldName];
      delete data.records[date][oldName];
    }
  });
  if (data.settlements?.[oldName]) {
    data.settlements[newName.trim()] = data.settlements[oldName];
    delete data.settlements[oldName];
  }
  saveData(data);
  renderInputTable();
  toast(`"${oldName}" → "${newName.trim()}" 변경 완료`);
}

const inputWrap = document.getElementById('inputTableWrap');

inputWrap.addEventListener('input', function(e) {

  if (!el.dataset.res) return;

  updateValue(el);

});

inputWrap.addEventListener('focusin', function(e) {
  const el = e.target;
  if (!el.dataset.res) return;
  const f = el.dataset.field;
  if (f === 'beforeLv' || f === 'afterLv' || f === 'beforePct' || f === 'afterPct') return;
  // 포커스 시 raw 숫자로 전환
  if (el.dataset.raw !== undefined && el.dataset.raw !== '') {
    el.value = el.dataset.raw;
  }
  el.select();
});

inputWrap.addEventListener('focusout', function(e) {
  const el = e.target;
  if (!el.dataset.res) return;
  const f = el.dataset.field;
  if (f === 'beforeLv' || f === 'afterLv' || f === 'beforePct' || f === 'afterPct') return;
  const raw = el.dataset.raw;
  if (raw !== undefined && raw !== '') {
    el.value = formatMeso(Number(raw));
  }
});

inputWrap.addEventListener('keydown', function(e) {
  const el = e.target;
  if (!el.dataset.res) return;

  const table = el.closest('table');
  const td = el.closest('td');
  const tr = td.parentElement;
  const dataRows = Array.from(table.querySelectorAll('tbody tr:not(.sum-row):not(.add-row)'));
  const rowIdx = dataRows.indexOf(tr);
  const cells = Array.from(tr.querySelectorAll('td.cell'));
  const colIdx = cells.indexOf(td);

  const cellInputs = Array.from(td.querySelectorAll('input[data-res]'));
  const inputIdx = cellInputs.indexOf(el);
  const isFirst = inputIdx === 0;
  const isLast = inputIdx === cellInputs.length - 1;
  const isBeforeRow = inputIdx < cellInputs.length / 2;

  let target = null;

  function getCellInputs(r, c) {
    if (r < 0 || r >= dataRows.length) return [];
    const tds = dataRows[r].querySelectorAll('td.cell');
    if (c < 0 || c >= tds.length) return [];
    return Array.from(tds[c].querySelectorAll('input[data-res]'));
  }

  function firstInput(r, c) { const arr = getCellInputs(r, c); return arr[0] || null; }
  function lastInput(r, c) { const arr = getCellInputs(r, c); return arr[arr.length - 1] || null; }
  function sameIdxInput(r, c, idx) { const arr = getCellInputs(r, c); return arr[Math.min(idx, arr.length - 1)] || null; }

  switch (e.key) {
    case 'ArrowRight':
      e.preventDefault();
      if (inputIdx < cellInputs.length - 1) {
        target = cellInputs[inputIdx + 1];
      } else {
        target = sameIdxInput(rowIdx, colIdx + 1, inputIdx);
      }
      break;
    case 'ArrowLeft':
      e.preventDefault();
      if (inputIdx > 0) {
        target = cellInputs[inputIdx - 1];
      } else {
        target = sameIdxInput(rowIdx, colIdx - 1, inputIdx);
      }
      break;
    case 'ArrowDown':
      e.preventDefault();
      if (isBeforeRow) {
        const afterIdx = inputIdx + cellInputs.length / 2;
        target = cellInputs[afterIdx] || null;
      } else {
        const beforeIdx = inputIdx - cellInputs.length / 2;
        target = sameIdxInput(rowIdx + 1, colIdx, beforeIdx);
      }
      break;
    case 'ArrowUp':
      e.preventDefault();
      if (!isBeforeRow) {
        const beforeIdx = inputIdx - cellInputs.length / 2;
        target = cellInputs[beforeIdx] || null;
      } else {
        const afterIdx = inputIdx + cellInputs.length / 2;
        target = sameIdxInput(rowIdx - 1, colIdx, afterIdx);
      }
      break;
    case 'Enter':
    case 'Tab':
      e.preventDefault();
      const reverse = e.shiftKey;
      if (reverse) {
        if (inputIdx > 0) {
          target = cellInputs[inputIdx - 1];
        } else {
          target = lastInput(rowIdx, colIdx - 1);
          if (!target) target = lastInput(rowIdx - 1, cells.length - 1);
        }
      } else {
        if (inputIdx < cellInputs.length - 1) {
          target = cellInputs[inputIdx + 1];
        } else {
          target = firstInput(rowIdx, colIdx + 1);
          if (!target) target = firstInput(rowIdx + 1, 0);
        }
      }
      break;
    case 'Escape':
      el.blur();
      break;
  }

  if (target) {
    target.focus();
    target.select();
  }
});

// 캐릭터별 마지막 정산일 이후 누적 계산
function getAccumulated(data, ch) {
  const lastDate = data.settlements?.[ch]?.lastDate || '';
  const totals = {};
  data.resources.forEach(r => totals[r] = 0);
  Object.keys(data.records).forEach(date => {
    if (date > lastDate) {
      data.resources.forEach(r => {
        if (r === '경험치') {
          totals[r] += getExpEarnedNum(data.records[date]?.[ch]?.[r]);
        } else {
          totals[r] += getEarned(data.records[date]?.[ch]?.[r]);
        }
      });
    }
  });
  return totals;
}

function settleChar(ch) {
  const data = loadData();
  if (!data.settlements) data.settlements = {};
  const totals = getAccumulated(data, ch);
  const hasAny = data.resources.some(r => totals[r] !== 0);
  if (!hasAny) { toast('누적된 재화가 없습니다.', 'error'); return; }
  if (!confirm(`"${ch}" 정산 완료 처리하시겠습니까?`)) return;

  data.settlements[ch] = {
    lastDate: todayStr(),
    history: [...(data.settlements[ch]?.history || []), { date: todayStr(), amounts: totals }]
  };
  saveData(data);
  renderHistory();
  toast(`"${ch}" ${todayStr()} 정산 완료`);
}

function rollbackSettle(ch) {
  const data = loadData();
  const hist = data.settlements?.[ch]?.history;
  if (!hist || !hist.length) { toast('롤백할 정산 이력이 없습니다.', 'error'); return; }
  const last = hist[hist.length - 1];
  if (!confirm(`"${ch}" 마지막 정산(${last.date})을 되돌리시겠습니까?\n${last.date} 이후 데이터가 다시 미정산 상태로 돌아갑니다.`)) return;

  hist.pop();
  if (hist.length > 0) {
    data.settlements[ch].lastDate = hist[hist.length - 1].date;
  } else {
    delete data.settlements[ch];
  }
  saveData(data);
  renderHistory();
  toast(`"${ch}" 정산 롤백 완료`);
}

function renderHistory() {
  const data = loadData();
  const settleWrap = document.getElementById('settlementWrap');
  const wrap = document.getElementById('historyTableWrap');

  if (!data.characters.length || !data.resources.length) {
    settleWrap.innerHTML = '<div class="no-data">캐릭터와 재화를 먼저 추가해주세요.</div>';
    wrap.innerHTML = '';
    return;
  }

  let sh = '<table class="sheet"><thead><tr><th class="corner">캐릭터</th>';
  data.resources.forEach(r => sh += `<th>${r}</th>`);
  sh += '<th style="min-width:100px">정산</th></tr></thead><tbody>';

  const unsettled = [];
  const settled = [];
  const noRecord = [];
  data.characters.forEach(ch => {
    const totals = getAccumulated(data, ch);
    const lastDate = data.settlements?.[ch]?.lastDate || '';
    const lastAmounts = data.settlements?.[ch]?.history?.slice(-1)[0]?.amounts || null;
    const hasAny = data.resources.some(r => totals[r] !== 0);
    const hasSettleHistory = !!(data.settlements?.[ch]?.history?.length);
    if (hasAny) {
      unsettled.push({ ch, totals, lastDate, lastAmounts });
    } else if (hasSettleHistory) {
      settled.push({ ch, totals, lastDate, lastAmounts });
    } else {
      noRecord.push({ ch });
    }
  });

  if (unsettled.length) {
    sh += `<tr><td colspan="${data.resources.length + 2}" style="padding:6px 10px;font-size:12px;font-weight:700;color:#1971c2;background:#0d1a30;border:1px solid #373A40;">미정산 (${unsettled.length})</td></tr>`;
    unsettled.forEach(({ ch, totals, lastDate, lastAmounts }) => {
      sh += `<tr><td class="row-header">${ch}</td>`;
      data.resources.forEach(r => {
        sh += `<td style="text-align:right;padding:4px 6px;font-family:Consolas,monospace;font-size:13px;color:#1971c2">${r === '경험치' ? (totals[r] ? totals[r].toFixed(3) + '%' : '') : formatNum(totals[r])}</td>`;
      });
      sh += `<td style="text-align:center;padding:4px 6px;">`;
      sh += `<button onclick="settleChar('${ch}')" style="padding:5px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;background:#1971c2;color:#fff;font-weight:600;font-family:inherit;">정산하기</button>`;
      if (lastDate) sh += `<div style="font-size:10px;color:#5c5f66;margin-top:3px">이전: ${lastDate}</div>`;
      sh += `</td></tr>`;
    });
  }

  if (settled.length) {
    sh += `<tr><td colspan="${data.resources.length + 2}" style="padding:6px 10px;font-size:12px;font-weight:700;color:#ef4444;background:#0a1a10;border:1px solid #373A40;">정산 완료 (${settled.length})</td></tr>`;
    settled.forEach(({ ch, totals, lastDate, lastAmounts }) => {
      sh += `<tr style="opacity:0.5"><td class="row-header" style="color:#ef4444">${ch}</td>`;
      data.resources.forEach(r => {
        sh += `<td style="text-align:right;padding:4px 6px;font-family:Consolas,monospace;font-size:12px;color:#ef4444;text-decoration:line-through">${formatNum((lastAmounts?.[r]) || 0)}</td>`;
      });
      sh += `<td style="text-align:center;padding:4px 6px;">`;
      sh += `<div style="font-size:11px;color:#ef4444">${lastDate} 정산완료</div>`;
      sh += `<button onclick="rollbackSettle('${ch}')" style="margin-top:3px;padding:3px 10px;border:1px solid #373A40;border-radius:4px;cursor:pointer;font-size:11px;background:#131822;color:#c0392b;font-family:inherit;">되돌리기</button>`;
      sh += `</td></tr>`;
    });
  }

  if (noRecord.length) {
    sh += `<tr><td colspan="${data.resources.length + 2}" style="padding:6px 10px;font-size:12px;font-weight:700;color:#5c5f66;background:#0C1019;border:1px solid #373A40;">기록 없음 (${noRecord.length})</td></tr>`;
    noRecord.forEach(({ ch }) => {
      sh += `<tr><td class="row-header" style="color:#5c5f66">${ch}</td>`;
      data.resources.forEach(() => sh += `<td></td>`);
      sh += `<td style="text-align:center;color:#373A40;font-size:12px">-</td></tr>`;
    });
  }

  sh += '</tbody></table>';
  settleWrap.innerHTML = sh;

  renderRecordView(data, wrap);
}

// 목~수 주간 정보 생성
function getWeekInfo(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const diff = (day - 4 + 7) % 7;
  const thu = new Date(d);
  thu.setDate(d.getDate() - diff);
  const wed = new Date(thu);
  wed.setDate(thu.getDate() + 6);
  const month = thu.getMonth();
  const firstOfMonth = new Date(thu.getFullYear(), month, 1);
  const firstThu = new Date(firstOfMonth);
  const fDay = firstOfMonth.getDay();
  const daysToThu = (4 - fDay + 7) % 7;
  firstThu.setDate(1 + daysToThu);
  const weekNum = Math.floor((thu - firstThu) / (7 * 86400000)) + 1;
  return {
    sortKey: thu.toISOString().slice(0,10),
    label: `${month + 1}월 ${weekNum}주차`,
    detail: `${thu.toISOString().slice(5,10)} ~ ${wed.toISOString().slice(5,10)}`,
    year: thu.getFullYear().toString()
  };
}

function hasActualData(data, date) {
  const dayRec = data.records[date];
  if (!dayRec) return false;
  return data.characters.some(ch => data.resources.some(r => {
    const rec = dayRec?.[ch]?.[r];
    if (!rec) return false;
    if (r === '경험치') return getExpEarnedNum(rec) !== 0;
    return getEarned(rec) !== 0;
  }));
}

function renderRecordView(data, wrap) {
  const allDates = Object.keys(data.records).filter(d => hasActualData(data, d)).sort().reverse();
  if (!allDates.length || !data.resources.length) {
    wrap.innerHTML = '<div class="no-data">기록이 없습니다.</div>';
    return;
  }

  if (currentView === 'daily') {
    renderDailyView(data, wrap, allDates);
  } else if (currentView === 'weekly') {
    renderGroupedView(data, wrap, allDates, 'weekly');
  } else {
    renderGroupedView(data, wrap, allDates, 'monthly');
  }
}

function renderDailyView(data, wrap, allDates) {
  const start = histStart.value;
  const end = histEnd.value;
  const dates = allDates.filter(d => d >= start && d <= end);

  if (!dates.length) {
    wrap.innerHTML = '<div class="no-data">해당 기간에 기록이 없습니다.</div>';
    return;
  }

  let html = '<table class="sheet"><thead><tr><th class="corner">날짜</th>';
  data.resources.forEach(r => html += `<th>${r}</th>`);
  html += '<th>상세</th></tr></thead><tbody>';

  dates.forEach(date => {
    html += `<tr><td class="row-header">${date}</td>`;
    data.resources.forEach(r => {
      let sum = 0;
      data.characters.forEach(ch => {
        const rec = data.records[date]?.[ch]?.[r];
        sum += (r === '경험치') ? getExpEarnedNum(rec) : getEarned(rec);
      });
      html += `<td style="text-align:right;padding:4px 8px;font-family:Consolas,monospace;font-size:13px;color:#D7D8DD">${formatNum(sum)}</td>`;
    });

    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderGroupedView(data, wrap, allDates, mode) {
  const selectedYear = document.getElementById('yearSelect').value || new Date().getFullYear().toString();

  const groups = {};
  const groupMeta = {};
  allDates.forEach(date => {
    if (mode === 'weekly') {
      const info = getWeekInfo(date);
      if (info.year !== selectedYear) return;
      const key = info.sortKey;
      if (!groups[key]) { groups[key] = []; groupMeta[key] = info; }
      groups[key].push(date);
    } else {
      const ym = date.slice(0, 7);
      if (date.slice(0,4) !== selectedYear) return;
      if (!groups[ym]) groups[ym] = [];
      groups[ym].push(date);
    }
  });

  const groupKeys = Object.keys(groups).sort().reverse();

  if (!groupKeys.length) {
    wrap.innerHTML = '<div class="no-data">해당 연도에 기록이 없습니다.</div>';
    return;
  }

  let html = '<table class="sheet"><thead><tr><th class="corner" style="width:90px">' + (mode === 'weekly' ? '주차' : '월') + '</th><th class="corner">캐릭터</th>';
  data.resources.forEach(r => html += `<th>${r}</th>`);
  html += '</tr></thead><tbody>';

  groupKeys.forEach(key => {
    const dates = groups[key];
    let label, sub;
    if (mode === 'weekly') {
      label = groupMeta[key].label;
      sub = groupMeta[key].detail;
    } else {
      const m = parseInt(key.slice(5));
      label = m + '월';
      sub = '';
    }
    let first = true;
    const charCount = data.characters.length;

    data.characters.forEach(ch => {
      html += '<tr>';
      if (first) {
        html += `<td class="row-header" rowspan="${charCount + 1}" style="vertical-align:middle;text-align:center;line-height:1.5;white-space:normal;font-size:13px;"><strong>${label}</strong>${sub ? '<br><span style="font-size:10px;color:#8F96A3;font-weight:400">'+sub+'</span>' : ''}</td>`;
        first = false;
      }
      html += `<td class="row-header">${ch}</td>`;
      data.resources.forEach(r => {
        let total = 0;
        dates.forEach(d => {
          const rec = data.records[d]?.[ch]?.[r];
          total += (r === '경험치') ? getExpEarnedNum(rec) : getEarned(rec);
        });
        html += `<td style="text-align:right;padding:4px 8px;font-family:Consolas,monospace;font-size:13px;color:#D7D8DD">${formatNum(total)}</td>`;
      });
      html += '</tr>';
    });

    // 그룹 합계
    html += '<tr class="sum-row">';
    html += `<td class="row-header">합계</td>`;
    data.resources.forEach(r => {
      let grand = 0;
      dates.forEach(d => {
        data.characters.forEach(ch => {
          const rec = data.records[d]?.[ch]?.[r];
          grand += (r === '경험치') ? getExpEarnedNum(rec) : getEarned(rec);
        });
      });
      html += `<td>${formatNum(grand)}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function startRename(span) {
  const oldName = span.textContent;
  const type = span.dataset.type;
  const index = Number(span.dataset.index);
  const input = document.createElement('input');
  input.type = 'text';
  input.value = oldName;
  input.className = 'rename-input';
  span.replaceWith(input);
  input.focus();
  input.select();

  function commit() {
    const newName = input.value.trim();
    const data = loadData();
    const arr = type === 'char' ? data.characters : data.resources;
    if (!newName || newName === oldName) {
      renderSettings();
      return;
    }
    if (arr.includes(newName)) {
      toast('이미 존재하는 이름입니다.', 'error');
      renderSettings();
      return;
    }
    if (type === 'char') {
      Object.keys(data.records).forEach(date => {
        if (data.records[date][oldName]) {
          data.records[date][newName] = data.records[date][oldName];
          delete data.records[date][oldName];
        }
      });
      if (data.settlements?.[oldName]) {
        data.settlements[newName] = data.settlements[oldName];
        delete data.settlements[oldName];
      }
    } else {
      Object.keys(data.records).forEach(date => {
        Object.keys(data.records[date]).forEach(ch => {
          if (data.records[date][ch][oldName] !== undefined) {
            data.records[date][ch][newName] = data.records[date][ch][oldName];
            delete data.records[date][ch][oldName];
          }
        });
      });
    }
    arr[index] = newName;
    saveData(data);
    renderSettings();
    toast(`"${oldName}" → "${newName}" 변경됨`);
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { input.value = oldName; input.blur(); }
  });
}

document.addEventListener('click', function(e) {
  if (e.target.classList.contains('item-name')) startRename(e.target);
});

function addCharacter(name) {
  if (!name) {
    const input = document.getElementById('newCharName');
    name = input.value.trim();
    if (!name) return;
    input.value = '';
  }
  const data = loadData();
  if (data.characters.includes(name)) { toast('이미 존재하는 캐릭터입니다.', 'error'); return; }
  data.characters.push(name);
  saveData(data);
  renderSettings();
  toast(`"${name}" 추가됨`);
}

function addResource() {
  const input = document.getElementById('newResName');
  const name = input.value.trim();
  if (!name) return;
  const data = loadData();
  if (data.resources.includes(name)) { toast('이미 존재하는 항목입니다.', 'error'); return; }
  data.resources.push(name);
  saveData(data);
  input.value = '';
  renderSettings();
  toast(`"${name}" 추가됨`);
}

function deleteItem(type, index) {
  const data = loadData();
  const arr = type === 'char' ? data.characters : data.resources;
  const name = arr[index];
  if (!confirm(`"${name}"을(를) 삭제하시겠습니까?`)) return;
  arr.splice(index, 1);
  if (type === 'char') {
    Object.keys(data.records).forEach(date => { delete data.records[date]?.[name]; });
    if (data.settlements?.[name]) delete data.settlements[name];
  }
  saveData(data);
  renderSettings();
  toast(`"${name}" 삭제됨`);
}

function moveItem(type, index, dir) {
  const data = loadData();
  const arr = type === 'char' ? data.characters : data.resources;
  const newIdx = index + dir;
  if (newIdx < 0 || newIdx >= arr.length) return;
  [arr[index], arr[newIdx]] = [arr[newIdx], arr[index]];
  saveData(data);
  renderSettings();
}

// --- Enter key for add inputs ---
document.getElementById('newCharName').addEventListener('keydown', e => { if (e.key === 'Enter') addCharacter(); });
document.getElementById('newResName').addEventListener('keydown', e => { if (e.key === 'Enter') addResource(); });

// --- Export / Import / Reset ---
function exportData() {
  const data = loadData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `maple_tracker_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('데이터 내보내기 완료');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.characters || !imported.resources || !imported.records) {
        toast('올바른 형식이 아닙니다.', 'error'); return;
      }
      saveData(imported);
      toast('데이터 가져오기 완료');
      renderInputTable();
      renderSettings();
    } catch { toast('파일 읽기 실패', 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  const pw = prompt('초기화 비밀번호를 입력하세요:');
  if (pw !== '0000') { toast('비밀번호가 틀렸습니다.', 'error'); return; }
  if (!confirm('현재 유저의 모든 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  const empty = { characters: [], resources: [...DEFAULT_RESOURCES], records: {}, settlements: {}, ledger: [] };
  saveData(empty);
  toast('데이터 초기화 완료');
  renderInputTable();
  renderSettings();
  renderDashboard();
}

// --- 잔고 기록 ---
function saveBalance() {
  const date = _selectedDate;
  const mesoStr = document.getElementById('balanceMesoInput').value.trim();
  const dajoStr = document.getElementById('balanceDajoInput').value.trim();
  if (!mesoStr && !dajoStr) { toast('잔고를 입력하세요.', 'error'); return; }
  const mesoVal = parseMeso(mesoStr);
  const dajoVal = Math.round(Number(dajoStr.replace(/[^0-9.\-]/g, '')) || 0);
  const data = loadData();
  if (!data.balanceLog) data.balanceLog = {};
  data.balanceLog[date] = { meso: mesoVal, dajo: dajoVal };
  saveData(data);
  renderBalanceSection();
  renderAssetCalendar();
  renderDashboard();
  toast('잔고 기록됨');
}

function deleteBalance() {
  const date = _selectedDate;
  if (!confirm(`${date} 잔고 기록을 삭제하시겠습니까?`)) return;
  const data = loadData();
  if (data.balanceLog) delete data.balanceLog[date];
  saveData(data);
  renderBalanceSection();
  renderAssetCalendar();
  renderDashboard();
  toast('삭제됨');
}

function renderBalanceSection() {
  const wrap = document.getElementById('balanceContent');
  if (!wrap) return;
  const data = loadData();
  const date = _selectedDate;
  const current = (data.balanceLog || {})[date] || null;
  const log = data.balanceLog || {};
  const prevDates = Object.keys(log).filter(d => d < date).sort().reverse();
  const prev = prevDates.length ? { date: prevDates[0], ...log[prevDates[0]] } : null;

  let html = '';

  // 이전 잔고 참조
  if (prev) {
    html += `<div style="display:flex;gap:12px;align-items:center;padding:6px 10px;background:#131822;border-radius:4px;margin-bottom:8px;font-size:12px;">`;
    html += `<span style="color:#5c5f66;">이전 잔고 (${prev.date})</span>`;
    html += `<span style="color:#8F96A3;"><img src="meso.png" style="width:12px;height:12px;vertical-align:middle;margin-right:2px">${formatMeso(prev.meso || 0)}</span>`;
    html += `<span style="color:#a78bfa;"><img src="dajo.png" style="width:12px;height:12px;vertical-align:middle;margin-right:2px">${prev.dajo || 0}개</span>`;
    html += `</div>`;
  }

  // 입력 필드
  const mesoDisplay = current ? String((current.meso || 0) / 100000000) : '';
  const dajoDisplay = current ? String(current.dajo || 0) : '';

  html += `<div style="display:flex;gap:8px;align-items:stretch;">`;
  html += `<div style="flex:1;background:#131822;border:1px solid #373A40;border-radius:6px;padding:8px;">`;
  html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">`;
  html += `<img src="meso.png" style="width:16px;height:16px">`;
  html += `<span style="color:#8F96A3;font-size:11px;font-weight:600;">총 메소</span>`;
  html += `</div>`;
  html += `<input type="text" id="balanceMesoInput" placeholder="억 단위 (예: 152.3)" value="${mesoDisplay}" style="width:100%;padding:6px 8px;background:#1B2030;border:1px solid #373A40;border-radius:4px;color:#C1C2C5;font-family:inherit;font-size:13px;text-align:right;">`;
  html += `</div>`;
  html += `<div style="flex:1;background:#131822;border:1px solid #373A40;border-radius:6px;padding:8px;">`;
  html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">`;
  html += `<img src="dajo.png" style="width:16px;height:16px">`;
  html += `<span style="color:#8F96A3;font-size:11px;font-weight:600;">총 다조</span>`;
  html += `</div>`;
  html += `<input type="text" id="balanceDajoInput" placeholder="개수 (예: 350)" value="${dajoDisplay}" style="width:100%;padding:6px 8px;background:#1B2030;border:1px solid #373A40;border-radius:4px;color:#C1C2C5;font-family:inherit;font-size:13px;text-align:right;">`;
  html += `</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:4px;justify-content:flex-end;">`;
  html += `<button class="btn-add" onclick="saveBalance()" style="padding:6px 20px;font-size:13px;">기록</button>`;
  if (current) html += `<button onclick="deleteBalance()" style="padding:4px 12px;font-size:11px;border:1px solid #373A40;background:#131822;color:#8F96A3;border-radius:4px;cursor:pointer;font-family:inherit;">삭제</button>`;
  html += `</div>`;
  html += `</div>`;

  // 변동 표시
  if (current && prev) {
    const deltaMeso = (current.meso || 0) - (prev.meso || 0);
    const deltaDajo = (current.dajo || 0) - (prev.dajo || 0);
    const mesoColor = deltaMeso > 0 ? '#ef4444' : deltaMeso < 0 ? '#60a5fa' : '#5c5f66';
    const dajoColor = deltaDajo > 0 ? '#ef4444' : deltaDajo < 0 ? '#60a5fa' : '#5c5f66';
    const dajoPrice = getDajoPrice();
    const totalMeso = deltaMeso + deltaDajo * dajoPrice;
    const totalColor = totalMeso > 0 ? '#ef4444' : totalMeso < 0 ? '#60a5fa' : '#5c5f66';

    html += `<div style="display:flex;gap:16px;align-items:center;padding:8px 10px;background:#0d1a2e;border:1px solid #1971c2;border-radius:4px;margin-top:8px;flex-wrap:wrap;">`;

  wrap.innerHTML = html;
